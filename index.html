<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Pixel Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen&family=Jersey+10&family=Pixelify+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #0d0d14;
  --panel: #13131b;
  --panel2: #1a1a23;
  --panel3: #22222d;
  --border: #2a2a38;
  --border-hi: #3a3a4a;
  --text: #ebebf2;
  --muted: #6e6e7c;
  --accent: #6b8fff;
  --accent-hi: #86a3ff;
  --accent-dim: rgba(107,143,255,0.15);
  --danger: #ff5566;
  --ok: #44d17a;
  --warn: #ffb347;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; font-size: 13px; }
body { display: flex; }
button { font-family: inherit; font-size: inherit; color: inherit; cursor: pointer; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #4a4a5a; }

/* ============ LEFT SIDEBAR ============ */
.sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.brand { padding: 16px 18px; font-weight: 800; font-size: 13px; letter-spacing: 1.8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: linear-gradient(180deg, var(--panel2), var(--panel)); }
.brand .dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 16px var(--accent), 0 0 4px var(--accent); }
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--panel2); }
.tab { flex: 1; padding: 12px 6px; font-size: 11px; font-weight: 600; background: transparent; border: none; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--panel); }
.tab:hover:not(.active) { color: #bbb; }
.panel { flex: 1; overflow-y: auto; padding: 14px; display: none; }
.panel.active { display: block; }

.upload-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 14px; transition: all 0.15s; box-shadow: 0 2px 8px rgba(107,143,255,0.25); }
.upload-btn:hover { background: var(--accent-hi); box-shadow: 0 4px 14px rgba(107,143,255,0.35); }
.upload-btn input { display: none; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.thumb { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: grab; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  background-color: #0a0a0f;
  background-image: linear-gradient(45deg, #1a1a24 25%, transparent 25%), linear-gradient(-45deg, #1a1a24 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a1a24 75%), linear-gradient(-45deg, transparent 75%, #1a1a24 75%);
  background-size: 12px 12px;
  background-position: 0 0, 0 6px, 6px -6px, -6px 0;
  transition: all 0.15s;
}
.thumb img { width: 92%; height: 92%; object-fit: contain; image-rendering: pixelated; image-rendering: crisp-edges; pointer-events: none; }
.thumb:hover { border-color: var(--accent); transform: translateY(-1px); }
.thumb:active { cursor: grabbing; }
.thumb .del { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.8); color: #fff; border: none; font-size: 13px; display: none; align-items: center; justify-content: center; line-height: 1; }
.thumb:hover .del { display: flex; }
.thumb .del:hover { background: var(--danger); }
.thumb .badge { position: absolute; top: 3px; left: 3px; background: rgba(107,143,255,0.9); color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

.font-list { display: flex; flex-direction: column; gap: 6px; }
.font-item { position: relative; padding: 12px 14px; background: var(--panel2); border-radius: 8px; border: 1px solid var(--border); font-size: 18px; cursor: pointer; word-break: break-all; transition: all 0.15s; }
.font-item:hover { border-color: var(--accent); transform: translateX(2px); }
.font-item.builtin { background: linear-gradient(135deg, #1a1f2e, #15181f); }
.font-item .label { display: block; font-size: 10px; color: var(--muted); font-family: system-ui; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.font-item .del { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; font-size: 13px; display: none; font-family: system-ui; }
.font-item:hover .del { display: block; }

.tool-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 13px 14px; margin-bottom: 8px; background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; text-align: left; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.tool-btn:hover { border-color: var(--accent); background: var(--panel3); transform: translateX(2px); }
.tool-btn .ico { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 16px; font-weight: 700; }

.section-title { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin: 18px 0 8px; font-weight: 700; }
.section-title:first-child { margin-top: 0; }

/* ============ MAIN ============ */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.toolbar { min-height: 56px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 6px; flex-wrap: wrap; }
.toolbar .group { display: flex; align-items: center; gap: 6px; padding: 0 10px; border-right: 1px solid var(--border); height: 36px; }
.toolbar .group:last-of-type { border-right: none; }
.toolbar button { padding: 7px 12px; background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 12px; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.toolbar button:hover { border-color: var(--border-hi); background: var(--panel3); }
.toolbar button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; box-shadow: 0 2px 8px rgba(107,143,255,0.3); }
.toolbar button.primary:hover { background: var(--accent-hi); }
.toolbar button.danger:hover { border-color: var(--danger); color: var(--danger); }
.toolbar button.icon { padding: 7px 9px; min-width: 34px; justify-content: center; font-size: 14px; }
.toolbar .spacer { flex: 1; }
.toolbar input[type=color] { width: 34px; height: 28px; border: 1px solid var(--border); background: var(--panel2); border-radius: 5px; padding: 2px; cursor: pointer; }
.toolbar input[type=number], .toolbar select, .toolbar input[type=range] { background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 6px 8px; font-size: 12px; font-family: inherit; }
.toolbar input[type=number] { width: 62px; }
.toolbar select { min-width: 140px; max-width: 170px; }
.toolbar input[type=range] { width: 80px; padding: 0; accent-color: var(--accent); }
.toolbar label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.toolbar #ctx-label { font-weight: 600; color: var(--text); min-width: 90px; }

.stage-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 36px; overflow: auto; position: relative;
  background-color: var(--bg);
  background-image:
    radial-gradient(circle at 20% 0%, rgba(107,143,255,0.06), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(176,132,255,0.04), transparent 50%);
}
.stage { position: relative; background: #ffffff; aspect-ratio: 16/9; width: min(92%, 1400px); box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px var(--border); overflow: hidden; touch-action: none; }
.stage.grid-on::before { content: ''; position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px); background-size: 40px 40px; z-index: 1; }

/* Snap guides */
.guide { position: absolute; background: #ff00ff; pointer-events: none; z-index: 999; box-shadow: 0 0 4px #ff00ff; }
.guide.v { width: 1px; top: 0; bottom: 0; }
.guide.h { height: 1px; left: 0; right: 0; }

/* ============ ITEMS ============ */
.item { position: absolute; user-select: none; transform-origin: center center; touch-action: none; }
.item.locked { cursor: not-allowed !important; }
.item .inner { width: 100%; height: 100%; pointer-events: none; }
.item.selected > .inner { outline: 2px solid var(--accent); outline-offset: 0; }
.item.locked.selected > .inner { outline-color: var(--warn); outline-style: dashed; }
.item img { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; -ms-interpolation-mode: nearest-neighbor; }
.item.smooth img { image-rendering: auto; }
.item .text-content { width: 100%; height: 100%; outline: none; white-space: pre-wrap; overflow: hidden; word-break: break-word; }
.item.editing { cursor: text; }
.item.editing .text-content { pointer-events: auto !important; user-select: text; }
.item .shape { width: 100%; height: 100%; }

/* Handles */
.handle { position: absolute; width: 12px; height: 12px; background: #fff; border: 2px solid var(--accent); border-radius: 2px; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.handle.tl { left: -7px; top: -7px; cursor: nwse-resize; }
.handle.tr { right: -7px; top: -7px; cursor: nesw-resize; }
.handle.bl { left: -7px; bottom: -7px; cursor: nesw-resize; }
.handle.br { right: -7px; bottom: -7px; cursor: nwse-resize; }
.handle.t  { left: calc(50% - 6px); top: -7px; cursor: ns-resize; }
.handle.b  { left: calc(50% - 6px); bottom: -7px; cursor: ns-resize; }
.handle.l  { left: -7px; top: calc(50% - 6px); cursor: ew-resize; }
.handle.r  { right: -7px; top: calc(50% - 6px); cursor: ew-resize; }
.handle.rot { left: calc(50% - 7px); top: -34px; background: var(--ok); border-color: #fff; border-radius: 50%; cursor: grab; width: 14px; height: 14px; }
.handle.rot::after { content:''; position: absolute; top: 10px; left: calc(50% - 1px); width: 2px; height: 20px; background: var(--ok); }

.empty { color: var(--muted); font-size: 12px; text-align: center; padding: 30px 10px; font-style: italic; }

/* ============ CONTEXT MENU ============ */
.ctx-menu { position: fixed; background: var(--panel2); border: 1px solid var(--border-hi); border-radius: 10px; padding: 5px; min-width: 220px; box-shadow: 0 16px 50px rgba(0,0,0,0.7); z-index: 10000; display: none; }
.ctx-menu.open { display: block; animation: fadeIn 0.12s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.ctx-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px; background: transparent; border: none; color: var(--text); font-size: 12px; border-radius: 6px; text-align: left; }
.ctx-menu button:hover { background: var(--accent); color: #fff; }
.ctx-menu button.danger:hover { background: var(--danger); }
.ctx-menu button .shortcut { margin-left: auto; color: var(--muted); font-size: 10px; }
.ctx-menu button:hover .shortcut { color: rgba(255,255,255,0.85); }
.ctx-menu .sep { height: 1px; background: var(--border); margin: 4px 6px; }
.ctx-menu button .ico { width: 16px; text-align: center; }

/* ============ TOAST ============ */
.toast { position: fixed; top: 72px; left: 50%; transform: translateX(-50%); background: var(--panel2); border: 1px solid var(--border-hi); color: var(--text); padding: 10px 18px; border-radius: 10px; font-size: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 5000; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }

/* ============ INFO BAR ============ */
.info { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); color: #ccc; padding: 8px 16px; border-radius: 20px; font-size: 11px; border: 1px solid var(--border); pointer-events: none; z-index: 500; }
</style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<div class="sidebar">
  <div class="brand"><span class="dot"></span>PIXEL STUDIO</div>
  <div style="padding:8px 16px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);line-height:1.5;">
    ⓘ Nur Session · Bilder & Fonts werden beim Reload gelöscht
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="images">Bilder</button>
    <button class="tab" data-tab="fonts">Fonts</button>
    <button class="tab" data-tab="tools">Werkzeuge</button>
  </div>

  <div class="panel active" id="panel-images">
    <label class="upload-btn">↑ Bilder hochladen
      <input type="file" id="img-upload" accept="image/*" multiple>
    </label>
    <div class="grid" id="img-grid"></div>
  </div>

  <div class="panel" id="panel-fonts">
    <label class="upload-btn">↑ Font hochladen
      <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" multiple>
    </label>
    <div class="section-title">Eingebaut · Pixel / Retro</div>
    <div class="font-list" id="builtin-fonts"></div>
    <div class="section-title">Hochgeladen</div>
    <div class="font-list" id="font-list"></div>
  </div>

  <div class="panel" id="panel-tools">
    <div class="section-title">Hinzufügen</div>
    <button class="tool-btn" data-add="text"><span class="ico">T</span>Text</button>
    <button class="tool-btn" data-add="rect"><span class="ico">▢</span>Rechteck</button>
    <button class="tool-btn" data-add="circle"><span class="ico">●</span>Kreis</button>
    <button class="tool-btn" data-add="triangle"><span class="ico">▲</span>Dreieck</button>
    <button class="tool-btn" data-add="line"><span class="ico">━</span>Linie</button>
    <div class="section-title">Canvas</div>
    <button class="tool-btn" id="btn-grid"><span class="ico">#</span>Raster umschalten</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="toolbar">
    <div class="group">
      <span id="ctx-label">Nichts ausgewählt</span>
    </div>

    <div class="group" id="ctx-text" style="display:none;">
      <select id="ctx-font"></select>
      <input type="number" id="ctx-size" value="48" min="4" max="600" title="Größe">
      <input type="color" id="ctx-color" value="#000000" title="Textfarbe">
      <button id="ctx-bold" class="icon" title="Fett"><b>B</b></button>
      <select id="ctx-align" title="Ausrichtung">
        <option value="left">Links</option>
        <option value="center">Mitte</option>
        <option value="right">Rechts</option>
      </select>
    </div>

    <div class="group" id="ctx-shape" style="display:none;">
      <label>Füll<input type="color" id="ctx-fill" value="#6b8fff"></label>
      <label>Rand<input type="color" id="ctx-stroke" value="#000000"></label>
      <input type="number" id="ctx-stroke-w" value="0" min="0" max="50" title="Randbreite">
      <label id="ctx-radius-label">R<input type="number" id="ctx-radius" value="0" min="0" max="200" title="Eckradius (Rechteck)"></label>
    </div>

    <div class="group" id="ctx-image" style="display:none;">
      <label><input type="checkbox" id="ctx-pixelated" checked> Pixel-Art</label>
    </div>

    <div class="group" id="ctx-common" style="display:none;">
      <label>↻<input type="number" id="ctx-rot" value="0" min="-360" max="360" step="1"></label>
      <label title="Deckkraft">α<input type="range" id="ctx-opacity" min="0" max="100" value="100"></label>
      <button id="ctx-flipx" class="icon" title="Horizontal spiegeln">⇌</button>
      <button id="ctx-flipy" class="icon" title="Vertikal spiegeln">⇅</button>
      <button id="ctx-front" class="icon" title="Nach vorne">▲</button>
      <button id="ctx-back" class="icon" title="Nach hinten">▼</button>
      <button id="ctx-dup" class="icon" title="Duplizieren (Strg+D)">⧉</button>
    </div>

    <div class="spacer"></div>

    <div class="group">
      <button id="btn-undo" class="icon" title="Rückgängig (Strg+Z)">↶</button>
      <button id="btn-redo" class="icon" title="Wiederholen (Strg+Y)">↷</button>
    </div>
    <div class="group">
      <label>BG<input type="color" id="bg-color" value="#ffffff"></label>
      <select id="export-size" title="Export-Größe">
        <option value="1920">1920×1080</option>
        <option value="1280">1280×720</option>
        <option value="3840">3840×2160 (4K)</option>
        <option value="native">Original</option>
      </select>
      <button id="btn-clear" class="danger">Leeren</button>
      <button id="btn-export" class="primary">↓ PNG speichern</button>
    </div>
  </div>

  <div class="stage-wrap">
    <div class="stage" id="stage"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctx-menu">
  <button data-act="duplicate"><span class="ico">⧉</span>Duplizieren<span class="shortcut">Strg+D</span></button>
  <button data-act="copy"><span class="ico">⎘</span>Kopieren<span class="shortcut">Strg+C</span></button>
  <button data-act="paste"><span class="ico">⎗</span>Einfügen<span class="shortcut">Strg+V</span></button>
  <div class="sep"></div>
  <button data-act="front"><span class="ico">▲</span>Nach ganz vorne</button>
  <button data-act="back"><span class="ico">▼</span>Nach ganz hinten</button>
  <div class="sep"></div>
  <button data-act="flipx"><span class="ico">⇌</span>Horizontal spiegeln</button>
  <button data-act="flipy"><span class="ico">⇅</span>Vertikal spiegeln</button>
  <button data-act="reset-rot"><span class="ico">↺</span>Drehung zurücksetzen</button>
  <div class="sep"></div>
  <button data-act="lock"><span class="ico" id="lock-ico">🔓</span><span id="lock-text">Sperren</span></button>
  <div class="sep"></div>
  <button data-act="delete" class="danger"><span class="ico">✕</span>Löschen<span class="shortcut">Entf</span></button>
</div>

<div class="info">Rechtsklick · Drag · Scroll · Pfeile · Entf · Strg+Z · Strg+D · Shift=Winkel/Snap</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
const stage = document.getElementById('stage');
const ctxMenu = document.getElementById('ctx-menu');
let selected = null;
let uid = 0;
let zCounter = 1;
let clipboard = null;
let history = [];
let historyIndex = -1;
let suppressHistory = false;

const standardFonts = ['Arial','Helvetica','Times New Roman','Courier New','Georgia','Verdana','Impact','Comic Sans MS'];
const pixelFonts = [
  { family: 'Press Start 2P', label: 'Minecraft-Style (blocky)' },
  { family: 'Jersey 10', label: 'Blocky Bold' },
  { family: 'Pixelify Sans', label: 'Pixelify' },
  { family: 'VT323', label: 'Terminal Retro' },
  { family: 'Silkscreen', label: 'Silkscreen Pixel' },
];
let customFonts = [];

// ============================================================
// TOAST
// ============================================================
const toastEl = document.getElementById('toast');
let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-' + t.dataset.tab).classList.add('active');
});

// ============================================================
// IMAGES
// ============================================================
const imgGrid = document.getElementById('img-grid');
let imageCache = []; // { name, url, builtin }

function renderImages() {
  imgGrid.innerHTML = '';
  if (!imageCache.length) { imgGrid.innerHTML = '<div class="empty">Noch keine Bilder</div>'; return; }
  imageCache.forEach((img, idx) => {
    const d = document.createElement('div');
    d.className = 'thumb';
    d.draggable = true;
    const delBtn = img.builtin ? '' : '<button class="del" title="Löschen">×</button>';
    const badge = img.builtin ? '<div class="badge">★</div>' : '';
    d.innerHTML = `<img src="${img.url}" crossorigin="anonymous">${badge}${delBtn}`;
    d.title = img.name + (img.builtin ? ' (mitgeliefert)' : '');
    d.addEventListener('dragstart', e => {
      e.dataTransfer.setData('type', 'image');
      e.dataTransfer.setData('url', img.url);
      e.dataTransfer.effectAllowed = 'copy';
    });
    d.addEventListener('dblclick', e => { if (e.target.tagName !== 'BUTTON') addImage(img.url); });
    if (!img.builtin) {
      d.querySelector('.del').onclick = e => {
        e.stopPropagation();
        URL.revokeObjectURL(img.url);
        imageCache.splice(idx, 1);
        renderImages();
      };
    }
    imgGrid.appendChild(d);
  });
}

async function loadBuiltinImages() {
  // Try three sources in order:
  //  1. GitHub Contents API (auto-detect from URL when hosted on github.io)
  //  2. images/manifest.json (if workflow built it)
  //  3. Just silently fail
  const imgExts = /\.(png|jpe?g|gif|webp|svg|bmp)$/i;

  // (1) GitHub API — works automatically when hosted on <user>.github.io/<repo>/
  const host = location.hostname;
  const ghMatch = host.match(/^([^.]+)\.github\.io$/i);
  if (ghMatch) {
    const user = ghMatch[1];
    // repo = first path segment; if none, it's a user.github.io root site
    const seg = location.pathname.split('/').filter(Boolean);
    const repo = seg[0] || user + '.github.io';
    try {
      const api = `https://api.github.com/repos/${user}/${repo}/contents/images`;
      const r = await fetch(api, { cache: 'no-cache' });
      if (r.ok) {
        const list = await r.json();
        if (Array.isArray(list)) {
          const imgs = list.filter(f => f.type === 'file' && imgExts.test(f.name));
          for (const f of imgs) {
            // prefer download_url (raw.githubusercontent.com — has CORS)
            const url = f.download_url || ('images/' + f.name);
            imageCache.push({ name: f.name, url, builtin: true });
          }
          if (imgs.length) { renderImages(); return; }
        }
      }
    } catch(e) { console.warn('GitHub API fetch failed', e); }
  }

  // (2) manifest.json fallback
  try {
    const r = await fetch('images/manifest.json', { cache: 'no-cache' });
    if (!r.ok) return;
    const list = await r.json();
    if (!Array.isArray(list)) return;
    for (const name of list) {
      if (imgExts.test(name)) imageCache.push({ name, url: 'images/' + name, builtin: true });
    }
    renderImages();
  } catch(e) { /* no manifest — fine */ }
}

document.getElementById('img-upload').addEventListener('change', e => {
  for (const file of e.target.files) {
    const url = URL.createObjectURL(file);
    imageCache.push({ name: file.name, url, builtin: false });
  }
  renderImages();
  toast(e.target.files.length + ' Bild(er) geladen');
  e.target.value = '';
});

const fontList = document.getElementById('font-list');
const builtinList = document.getElementById('builtin-fonts');
const fontSelect = document.getElementById('ctx-font');

function renderBuiltin() {
  builtinList.innerHTML = '';
  pixelFonts.forEach(f => {
    const d = document.createElement('div');

    d.style.fontFamily = `'${f.family}', monospace`;
    d.innerHTML = `Abc 123<span class="label">${f.label}</span>`;
    builtinList.appendChild(d);
  });
}
renderBuiltin();

function rebuildFontSelect() {
  fontSelect.innerHTML = '';
  const gPixel = document.createElement('optgroup'); gPixel.label = '▪ Pixel / Retro';
  pixelFonts.forEach(f => { const o = document.createElement('option'); o.value = f.family; o.textContent = f.family; gPixel.appendChild(o); });
  fontSelect.appendChild(gPixel);
  const gStd = document.createElement('optgroup'); gStd.label = 'Standard';
  standardFonts.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; gStd.appendChild(o); });
  fontSelect.appendChild(gStd);
  if (customFonts.length) {
    const gC = document.createElement('optgroup'); gC.label = 'Eigene';
    customFonts.forEach(f => { const o = document.createElement('option'); o.value = f.family; o.textContent = f.name; gC.appendChild(o); });
    fontSelect.appendChild(gC);
  }
}
rebuildFontSelect();

function renderFonts() {
  fontList.innerHTML = '';
  if (!customFonts.length) { fontList.innerHTML = '<div class="empty">Noch keine Fonts</div>'; rebuildFontSelect(); return; }
  customFonts.forEach((f, idx) => {
    const d = document.createElement('div');
    d.className = 'font-item';
    d.style.fontFamily = f.family;
    d.innerHTML = `Abc 123<span class="label">${f.name}</span><button class="del">×</button>`;
    d.querySelector('.del').onclick = e => {
      e.stopPropagation();
      try { document.fonts.delete(f.face); } catch(_) {}
      customFonts.splice(idx, 1);
      renderFonts();
    };
    fontList.appendChild(d);
  });
  rebuildFontSelect();
}

document.getElementById('font-upload').addEventListener('change', async e => {
  for (const file of e.target.files) {
    const family = 'cf_' + file.name.replace(/[^a-z0-9]/gi, '_') + '_' + Date.now();
    const buf = await file.arrayBuffer();
    const face = new FontFace(family, buf);
    try {
      await face.load();
      document.fonts.add(face);
      customFonts.push({ family, name: file.name, face });
    } catch(err) { console.error('font load fail', err); }
  }
  renderFonts();
  toast(e.target.files.length + ' Font(s) geladen');

});

// ============================================================
// ITEM FACTORY
// ============================================================
function bindItem(el) {
  el.addEventListener('pointerdown', onItemPointerDown);
  el.addEventListener('contextmenu', onItemContextMenu);
  if (el.dataset.type === 'text') {
    el.addEventListener('dblclick', onTextDblClick);
    const tc = el.querySelector('.text-content');
    if (tc) tc.addEventListener('blur', () => {
      el.classList.remove('editing');
      tc.contentEditable = 'false';
      pushHistory();
    });
  }
}

function makeItem(type, x, y, w, h) {
  const el = document.createElement('div');
  el.className = 'item';
  el.dataset.type = type;
  el.dataset.id = ++uid;
  el.dataset.rot = '0';
  el.dataset.flipX = '0';
  el.dataset.flipY = '0';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  el.style.zIndex = ++zCounter;
  el.style.opacity = '1';
  applyTransform(el);
  const inner = document.createElement('div');
  inner.className = 'inner';
  el.appendChild(inner);
  stage.appendChild(el);
  bindItem(el);
  return el;
}

function applyTransform(el) {
  const rot = parseFloat(el.dataset.rot) || 0;
  const fx = el.dataset.flipX === '1' ? -1 : 1;
  const fy = el.dataset.flipY === '1' ? -1 : 1;
  el.style.transform = `rotate(${rot}deg) scale(${fx}, ${fy})`;
}

function addImage(url, x, y, cb) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const stageW = stage.offsetWidth, stageH = stage.offsetHeight;
    const maxW = stageW * 0.6;
    const maxH = stageH * 0.8;
    // Target size for small images (pixel art): scale up to ~1/4 of stage width,
    // preferring integer multiples so pixels stay crisp
    const targetW = stageW * 0.25;
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w < targetW) {
      const mult = Math.max(1, Math.floor(targetW / w));
      w *= mult;
      h *= mult;
    }
    // clamp to max size
    if (w > maxW) { const s = maxW / w; w *= s; h *= s; }
    if (h > maxH) { const s = maxH / h; w *= s; h *= s; }
    const px = x != null ? x - w/2 : (stageW/2 - w/2);
    const py = y != null ? y - h/2 : (stageH/2 - h/2);
    const el = makeItem('image', px, py, w, h);
    const i = document.createElement('img');
    i.src = url;
    i.crossOrigin = 'anonymous';
    i.draggable = false;
    el.querySelector('.inner').appendChild(i);
    select(el);
    pushHistory();
    if (cb) cb(el);
  };
  img.src = url;
}

function addText(x, y, opts = {}) {
  const w = opts.w || 500, h = opts.h || 100;
  const px = x != null ? x : (stage.offsetWidth/2 - w/2);
  const py = y != null ? y : (stage.offsetHeight/2 - h/2);
  const el = makeItem('text', px, py, w, h);
  const tc = document.createElement('div');
  tc.className = 'text-content';
  tc.style.fontFamily = `'${opts.font || 'Press Start 2P'}'`;
  tc.style.fontSize = (opts.size || 40) + 'px';
  tc.style.color = opts.color || '#000000';
  tc.style.textAlign = opts.align || 'left';
  if (opts.bold) tc.style.fontWeight = 'bold';
  tc.textContent = opts.text || 'TEXT';
  el.querySelector('.inner').appendChild(tc);
  bindItem(el);
  select(el);
  pushHistory();
  return el;
}

function addShape(kind, x, y, opts = {}) {
  const w = opts.w || 200, h = opts.h || (kind === 'line' ? 6 : 200);
  const px = x != null ? x : (stage.offsetWidth/2 - w/2);
  const py = y != null ? y : (stage.offsetHeight/2 - h/2);
  const el = makeItem(kind, px, py, w, h);
  const inner = el.querySelector('.inner');
  el.dataset.fill = opts.fill || '#6b8fff';
  el.dataset.stroke = opts.stroke || '#000000';
  el.dataset.strokeW = opts.strokeW || '0';
  el.dataset.radius = opts.radius || '0';
  if (kind === 'triangle') {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 100 100'); svg.setAttribute('preserveAspectRatio','none');
    svg.style.width = '100%'; svg.style.height = '100%';
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','50,5 95,95 5,95');
    poly.setAttribute('fill', el.dataset.fill);
    poly.setAttribute('stroke', el.dataset.stroke);
    poly.setAttribute('stroke-width', el.dataset.strokeW);
    svg.appendChild(poly);
    inner.appendChild(svg);
  } else {
    const sh = document.createElement('div');
    sh.className = 'shape';
    sh.style.background = el.dataset.fill;
    if (kind === 'circle') sh.style.borderRadius = '50%';
    else if (kind === 'rect' && parseFloat(el.dataset.radius) > 0) sh.style.borderRadius = el.dataset.radius + 'px';
    if (parseFloat(el.dataset.strokeW) > 0) sh.style.border = `${el.dataset.strokeW}px solid ${el.dataset.stroke}`;
    inner.appendChild(sh);
  }
  select(el);
  pushHistory();
  return el;
}

document.querySelectorAll('[data-add]').forEach(b => b.onclick = () => {
  const t = b.dataset.add;
  if (t === 'text') addText();
  else addShape(t);
});

// SELECTION
// ============================================================
function clearHandles() {
  document.querySelectorAll('.item .handle').forEach(h => h.remove());
}

function select(el) {
  if (selected) selected.classList.remove('selected');
  clearHandles();
  selected = el;
  if (el) {
    el.classList.add('selected');
    if (!el.dataset.locked) {
      ['tl','tr','bl','br','t','b','l','r'].forEach(pos => {
        const h = document.createElement('div');
        h.className = 'handle ' + pos;
        el.appendChild(h);
        h.addEventListener('pointerdown', ev => startResize(ev, pos));
      });
      const r = document.createElement('div');
      r.className = 'handle rot';
      el.appendChild(r);
      r.addEventListener('pointerdown', startRotate);
    }
  }
  updateToolbar();
}

function updateToolbar() {
  const t = document.getElementById('ctx-text');
  const s = document.getElementById('ctx-shape');
  const i = document.getElementById('ctx-image');
  const c = document.getElementById('ctx-common');
  const lbl = document.getElementById('ctx-label');
  t.style.display = 'none'; s.style.display = 'none'; i.style.display = 'none'; c.style.display = 'none';
  if (!selected) { lbl.textContent = 'Nichts ausgewählt'; return; }
  const type = selected.dataset.type;
  lbl.textContent = '● ' + type.toUpperCase() + (selected.dataset.locked ? ' 🔒' : '');
  c.style.display = 'flex';
  document.getElementById('ctx-rot').value = Math.round(parseFloat(selected.dataset.rot) || 0);
  document.getElementById('ctx-opacity').value = Math.round((parseFloat(selected.style.opacity) || 1) * 100);

  if (type === 'text') {
    t.style.display = 'flex';
    const tc = selected.querySelector('.text-content');
    const ff = (tc.style.fontFamily || '').replace(/['"]/g,'').split(',')[0].trim();
    document.getElementById('ctx-font').value = ff;
    document.getElementById('ctx-size').value = parseInt(tc.style.fontSize) || 40;
    document.getElementById('ctx-color').value = rgbToHex(tc.style.color) || '#000000';
    document.getElementById('ctx-align').value = tc.style.textAlign || 'left';
  } else if (type === 'image') {
    i.style.display = 'flex';
    document.getElementById('ctx-pixelated').checked = !selected.classList.contains('smooth');
  } else {
    s.style.display = 'flex';
    document.getElementById('ctx-fill').value = selected.dataset.fill || '#6b8fff';
    document.getElementById('ctx-stroke').value = selected.dataset.stroke || '#000000';
    document.getElementById('ctx-stroke-w').value = selected.dataset.strokeW || 0;
    document.getElementById('ctx-radius').value = selected.dataset.radius || 0;
    document.getElementById('ctx-radius-label').style.display = type === 'rect' ? 'flex' : 'none';
  }
}

function rgbToHex(rgb) {
  if (!rgb) return null;
  if (rgb.startsWith('#')) return rgb;
  const m = rgb.match(/\d+/g);
  if (!m) return null;
  return '#' + m.slice(0,3).map(x => (+x).toString(16).padStart(2,'0')).join('');
}

stage.addEventListener('pointerdown', e => {
  if (e.target === stage) { select(null); hideCtxMenu(); }
});

// ============================================================
// ITEM HANDLERS
// ============================================================
function onItemPointerDown(e) {
  if (e.target.classList.contains('handle')) return;
  if (e.button === 2) return;
  const el = e.currentTarget;
  if (el.classList.contains('editing')) return;
  e.stopPropagation();
  hideCtxMenu();
  select(el);
  if (el.dataset.locked) return;
  startDrag(e, el);
}

function onItemContextMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  select(e.currentTarget);
  showCtxMenu(e.clientX, e.clientY);
}

function onTextDblClick(e) {
  e.stopPropagation();
  const el = e.currentTarget;
  if (el.dataset.locked) return;
  const tc = el.querySelector('.text-content');
  el.classList.add('editing');
  tc.contentEditable = 'true';
  tc.focus();
  const range = document.createRange();
  range.selectNodeContents(tc);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// ============================================================
// DRAG / RESIZE / ROTATE
// ============================================================
function showGuides(lines) {
  document.querySelectorAll('.guide').forEach(g => g.remove());
  lines.forEach(L => {
    const g = document.createElement('div');
    g.className = 'guide ' + L.type;
    if (L.type === 'v') g.style.left = L.pos + 'px';
    else g.style.top = L.pos + 'px';
    stage.appendChild(g);
  });
}
function clearGuides() { document.querySelectorAll('.guide').forEach(g => g.remove()); }

function startDrag(e, el) {
  e.preventDefault();
  const sx = e.clientX, sy = e.clientY;
  const ox = parseFloat(el.style.left), oy = parseFloat(el.style.top);
  const pointerId = e.pointerId;
  try { el.setPointerCapture(pointerId); } catch(_) {}
  let moved = false;
  function mv(ev) {
    if (ev.pointerId !== pointerId) return;
    const dx = ev.clientX - sx, dy = ev.clientY - sy;
    if (!moved && Math.abs(dx) + Math.abs(dy) < 2) return;
    moved = true;
    let nx = ox + dx, ny = oy + dy;
    // snap to stage center
    const w = el.offsetWidth, h = el.offsetHeight;
    const sw = stage.offsetWidth, sh = stage.offsetHeight;
    const cx = nx + w/2, cy = ny + h/2;
    const guides = [];
    const SNAP = 6;
    if (Math.abs(cx - sw/2) < SNAP) { nx = sw/2 - w/2; guides.push({type:'v', pos: sw/2}); }
    if (Math.abs(cy - sh/2) < SNAP) { ny = sh/2 - h/2; guides.push({type:'h', pos: sh/2}); }
    if (Math.abs(nx) < SNAP) { nx = 0; guides.push({type:'v', pos: 0}); }
    if (Math.abs(ny) < SNAP) { ny = 0; guides.push({type:'h', pos: 0}); }
    if (Math.abs(nx + w - sw) < SNAP) { nx = sw - w; guides.push({type:'v', pos: sw}); }
    if (Math.abs(ny + h - sh) < SNAP) { ny = sh - h; guides.push({type:'h', pos: sh}); }
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
    showGuides(guides);
  }
  function up(ev) {
    if (ev.pointerId !== pointerId) return;
    el.removeEventListener('pointermove', mv);
    el.removeEventListener('pointerup', up);
    el.removeEventListener('pointercancel', up);
    try { el.releasePointerCapture(pointerId); } catch(_) {}
    clearGuides();
    if (moved) pushHistory();
  }
  el.addEventListener('pointermove', mv);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
}

function startResize(e, pos) {
  e.stopPropagation(); e.preventDefault();
  const el = selected;
  const rot = (parseFloat(el.dataset.rot) || 0) * Math.PI / 180;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const startX = e.clientX, startY = e.clientY;
  const ow = el.offsetWidth, oh = el.offsetHeight;
  const ol = parseFloat(el.style.left), ot = parseFloat(el.style.top);
  const cx = ol + ow/2, cy = ot + oh/2;
  const pointerId = e.pointerId;
  const handle = e.currentTarget;
  try { handle.setPointerCapture(pointerId); } catch(_) {}
  function mv(ev) {
    if (ev.pointerId !== pointerId) return;
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    const lx = dx * cos + dy * sin;
    const ly = -dx * sin + dy * cos;
    let nw = ow, nh = oh, dlx = 0, dly = 0;
    if (pos.includes('r')) nw = Math.max(10, ow + lx);
    if (pos.includes('l')) { nw = Math.max(10, ow - lx); dlx = lx; }
    if (pos.includes('b')) nh = Math.max(10, oh + ly);
    if (pos.includes('t')) { nh = Math.max(10, oh - ly); dly = ly; }
    const ddx = dlx/2, ddy = dly/2;
    const wx = ddx * cos - ddy * sin;
    const wy = ddx * sin + ddy * cos;
    el.style.width = nw + 'px';
    el.style.height = nh + 'px';
    el.style.left = (cx + wx - nw/2) + 'px';
    el.style.top = (cy + wy - nh/2) + 'px';
  }
  function up(ev) {
    if (ev.pointerId !== pointerId) return;
    handle.removeEventListener('pointermove', mv);
    handle.removeEventListener('pointerup', up);
    handle.removeEventListener('pointercancel', up);
    try { handle.releasePointerCapture(pointerId); } catch(_) {}
    pushHistory();
  }
  handle.addEventListener('pointermove', mv);
  handle.addEventListener('pointerup', up);
  handle.addEventListener('pointercancel', up);
}

function startRotate(e) {
  e.stopPropagation(); e.preventDefault();
  const el = selected;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const startAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
  const startRot = parseFloat(el.dataset.rot) || 0;
  const pointerId = e.pointerId;
  const handle = e.currentTarget;
  try { handle.setPointerCapture(pointerId); } catch(_) {}
  function mv(ev) {
    if (ev.pointerId !== pointerId) return;
    const a = Math.atan2(ev.clientY - cy, ev.clientX - cx) * 180 / Math.PI;
    let r = startRot + (a - startAngle);
    if (ev.shiftKey) r = Math.round(r/15)*15;
    el.dataset.rot = r;
    applyTransform(el);
    document.getElementById('ctx-rot').value = Math.round(r);
  }
  function up(ev) {
    if (ev.pointerId !== pointerId) return;
    handle.removeEventListener('pointermove', mv);
    handle.removeEventListener('pointerup', up);
    handle.removeEventListener('pointercancel', up);
    try { handle.releasePointerCapture(pointerId); } catch(_) {}
    pushHistory();
  }
  handle.addEventListener('pointermove', mv);
  handle.addEventListener('pointerup', up);
  handle.addEventListener('pointercancel', up);
}

// ============================================================
// DROP FROM SIDEBAR
// ============================================================
stage.addEventListener('dragover', e => e.preventDefault());
stage.addEventListener('drop', e => {
  e.preventDefault();
  const type = e.dataTransfer.getData('type');
  const rect = stage.getBoundingClientRect();
  const scale = stage.offsetWidth / rect.width;
  const x = (e.clientX - rect.left) * scale;
  const y = (e.clientY - rect.top) * scale;
  if (type === 'image') addImage(e.dataTransfer.getData('url'), x, y);
});

// ============================================================
// CONTEXT MENU
// ============================================================
function showCtxMenu(x, y) {
  ctxMenu.classList.add('open');
  const mw = 230, mh = 400;
  if (x + mw > window.innerWidth) x = window.innerWidth - mw - 4;
  if (y + mh > window.innerHeight) y = window.innerHeight - mh - 4;
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top = y + 'px';
  const li = document.getElementById('lock-ico');
  const lt = document.getElementById('lock-text');
  if (selected?.dataset.locked) { li.textContent = '🔒'; lt.textContent = 'Entsperren'; }
  else { li.textContent = '🔓'; lt.textContent = 'Sperren'; }
}
function hideCtxMenu() { ctxMenu.classList.remove('open'); }

document.addEventListener('pointerdown', e => { if (!ctxMenu.contains(e.target)) hideCtxMenu(); });
document.addEventListener('contextmenu', e => {
  if (e.target.closest('.stage') || e.target.closest('.item')) e.preventDefault();
});
ctxMenu.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  doAction(btn.dataset.act);
  hideCtxMenu();
});

// ============================================================
// ACTIONS
// ============================================================
function doAction(act) {
  if (!selected && !['paste'].includes(act)) return;
  switch(act) {
    case 'duplicate': duplicateItem(); break;
    case 'copy': clipboard = selected.outerHTML; toast('Kopiert'); break;
    case 'paste': pasteItem(); break;
    case 'delete': selected.remove(); select(null); pushHistory(); break;
    case 'front': selected.style.zIndex = ++zCounter; pushHistory(); break;
    case 'back':
      zCounter++;
      document.querySelectorAll('.item').forEach(i => { if (i !== selected) i.style.zIndex = (parseInt(i.style.zIndex)||0) + 1; });
      selected.style.zIndex = 1;
      pushHistory();
      break;
    case 'flipx':
      selected.dataset.flipX = selected.dataset.flipX === '1' ? '0' : '1';
      applyTransform(selected); pushHistory(); break;
    case 'flipy':
      selected.dataset.flipY = selected.dataset.flipY === '1' ? '0' : '1';
      applyTransform(selected); pushHistory(); break;
    case 'reset-rot':
      selected.dataset.rot = '0'; applyTransform(selected); updateToolbar(); pushHistory(); break;
    case 'lock':
      if (selected.dataset.locked) { delete selected.dataset.locked; selected.classList.remove('locked'); }
      else { selected.dataset.locked = '1'; selected.classList.add('locked'); }
      select(selected);
      break;
  }
}

function duplicateItem() {
  if (!selected) return;
  const clone = selected.cloneNode(true);
  clone.classList.remove('selected');
  clone.querySelectorAll('.handle').forEach(h => h.remove());
  clone.dataset.id = ++uid;
  clone.style.left = (parseFloat(selected.style.left) + 20) + 'px';
  clone.style.top = (parseFloat(selected.style.top) + 20) + 'px';
  clone.style.zIndex = ++zCounter;
  stage.appendChild(clone);
  bindItem(clone);
  select(clone);
  pushHistory();
  toast('Dupliziert');
}

function pasteItem() {
  if (!clipboard) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = clipboard;
  const el = tmp.firstElementChild;
  if (!el) return;
  el.classList.remove('selected');
  el.querySelectorAll('.handle').forEach(h => h.remove());
  el.dataset.id = ++uid;
  el.style.left = (parseFloat(el.style.left) + 30) + 'px';
  el.style.top = (parseFloat(el.style.top) + 30) + 'px';
  el.style.zIndex = ++zCounter;
  stage.appendChild(el);
  bindItem(el);
  select(el);
  pushHistory();
  toast('Eingefügt');
}

// ============================================================
// TOOLBAR BINDINGS
// ============================================================
document.getElementById('ctx-font').addEventListener('change', e => {
  if (selected?.dataset.type === 'text') { selected.querySelector('.text-content').style.fontFamily = `'${e.target.value}'`; pushHistory(); }
});
document.getElementById('ctx-size').addEventListener('input', e => {
  if (selected?.dataset.type === 'text') selected.querySelector('.text-content').style.fontSize = e.target.value + 'px';
});
document.getElementById('ctx-size').addEventListener('change', pushHistory);
document.getElementById('ctx-color').addEventListener('input', e => {
  if (selected?.dataset.type === 'text') selected.querySelector('.text-content').style.color = e.target.value;
});
document.getElementById('ctx-color').addEventListener('change', pushHistory);
document.getElementById('ctx-bold').addEventListener('click', () => {
  if (selected?.dataset.type === 'text') {
    const tc = selected.querySelector('.text-content');
    tc.style.fontWeight = tc.style.fontWeight === 'bold' ? 'normal' : 'bold';
    pushHistory();
  }
});
document.getElementById('ctx-align').addEventListener('change', e => {
  if (selected?.dataset.type === 'text') { selected.querySelector('.text-content').style.textAlign = e.target.value; pushHistory(); }
});

function applyShapeStyle() {
  if (!selected) return;
  const fill = document.getElementById('ctx-fill').value;
  const stroke = document.getElementById('ctx-stroke').value;
  const sw = document.getElementById('ctx-stroke-w').value;
  const rad = document.getElementById('ctx-radius').value;
  selected.dataset.fill = fill;
  selected.dataset.stroke = stroke;
  selected.dataset.strokeW = sw;
  selected.dataset.radius = rad;
  if (selected.dataset.type === 'triangle') {
    const poly = selected.querySelector('polygon');
    if (poly) { poly.setAttribute('fill', fill); poly.setAttribute('stroke', stroke); poly.setAttribute('stroke-width', sw); }
  } else {
    const sh = selected.querySelector('.shape');
    if (sh) {
      sh.style.background = fill;
      sh.style.border = sw > 0 ? `${sw}px solid ${stroke}` : 'none';
      if (selected.dataset.type === 'rect') sh.style.borderRadius = rad + 'px';
    }
  }
}
['ctx-fill','ctx-stroke','ctx-stroke-w','ctx-radius'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', applyShapeStyle);
  el.addEventListener('change', pushHistory);
});

document.getElementById('ctx-pixelated').addEventListener('change', e => {
  if (selected?.dataset.type === 'image') { selected.classList.toggle('smooth', !e.target.checked); pushHistory(); }
});

document.getElementById('ctx-rot').addEventListener('input', e => {
  if (selected) { selected.dataset.rot = e.target.value; applyTransform(selected); }
});
document.getElementById('ctx-rot').addEventListener('change', pushHistory);
document.getElementById('ctx-opacity').addEventListener('input', e => {
  if (selected) selected.style.opacity = (e.target.value / 100);
});
document.getElementById('ctx-opacity').addEventListener('change', pushHistory);

document.getElementById('ctx-flipx').onclick = () => doAction('flipx');
document.getElementById('ctx-flipy').onclick = () => doAction('flipy');
document.getElementById('ctx-front').onclick = () => doAction('front');
document.getElementById('ctx-back').onclick = () => doAction('back');
document.getElementById('ctx-dup').onclick = () => doAction('duplicate');

document.getElementById('btn-clear').onclick = () => {
  if (!stage.querySelector('.item')) return;
  if (!confirm('Wirklich alles löschen?')) return;
  stage.querySelectorAll('.item').forEach(i => i.remove());
  select(null);
  pushHistory();
};
document.getElementById('bg-color').addEventListener('input', e => stage.style.background = e.target.value);
document.getElementById('bg-color').addEventListener('change', pushHistory);

document.getElementById('btn-undo').onclick = undo;
document.getElementById('btn-redo').onclick = redo;
document.getElementById('btn-grid').onclick = () => stage.classList.toggle('grid-on');

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  const inInput = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';
  const inEdit = !!document.querySelector('.item.editing');
  if (inInput || inEdit) return;

  const ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if (ctrl && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
  if (ctrl && e.key.toLowerCase() === 'd' && selected) { e.preventDefault(); duplicateItem(); return; }
  if (ctrl && e.key.toLowerCase() === 'c' && selected) { e.preventDefault(); clipboard = selected.outerHTML; toast('Kopiert'); return; }
  if (ctrl && e.key.toLowerCase() === 'v' && clipboard) { e.preventDefault(); pasteItem(); return; }

  if (!selected) return;
  if (selected.dataset.locked) return;
  if (e.key === 'Delete' || e.key === 'Backspace') { selected.remove(); select(null); pushHistory(); e.preventDefault(); return; }
  const step = e.shiftKey ? 10 : 1;
  let moved = false;
  if (e.key === 'ArrowLeft') { selected.style.left = (parseFloat(selected.style.left) - step) + 'px'; moved = true; }
  else if (e.key === 'ArrowRight') { selected.style.left = (parseFloat(selected.style.left) + step) + 'px'; moved = true; }
  else if (e.key === 'ArrowUp') { selected.style.top = (parseFloat(selected.style.top) - step) + 'px'; moved = true; }
  else if (e.key === 'ArrowDown') { selected.style.top = (parseFloat(selected.style.top) + step) + 'px'; moved = true; }
  if (moved) { e.preventDefault(); debouncedHistory(); }
});

let histTimer;
function debouncedHistory() { clearTimeout(histTimer); histTimer = setTimeout(pushHistory, 400); }

stage.addEventListener('wheel', e => {
  if (!selected || selected.dataset.locked) return;
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.05 : 0.95;
  const w = selected.offsetWidth * f;
  const h = selected.offsetHeight * f;
  const ol = parseFloat(selected.style.left), ot = parseFloat(selected.style.top);
  selected.style.left = (ol + (selected.offsetWidth - w)/2) + 'px';
  selected.style.top = (ot + (selected.offsetHeight - h)/2) + 'px';
  selected.style.width = w + 'px';
  selected.style.height = h + 'px';
  debouncedHistory();
}, { passive: false });

// ============================================================
// HISTORY
// ============================================================
function snapshot() {
  return { html: stage.innerHTML, bg: stage.style.background || '#ffffff' };
}
function pushHistory() {
  if (suppressHistory) return;
  history = history.slice(0, historyIndex + 1);
  history.push(snapshot());
  if (history.length > 60) history.shift();
  historyIndex = history.length - 1;
}
function restore(snap) {
  suppressHistory = true;
  stage.innerHTML = snap.html;
  stage.style.background = snap.bg;
  selected = null;
  stage.querySelectorAll('.item').forEach(el => {
    el.querySelectorAll('.handle').forEach(h => h.remove());
    el.querySelectorAll('.guide').forEach(g => g.remove());
    el.classList.remove('selected');
    bindItem(el);
    const z = parseInt(el.style.zIndex) || 0;
    if (z > zCounter) zCounter = z;
  });
  stage.querySelectorAll('.guide').forEach(g => g.remove());
  updateToolbar();
  suppressHistory = false;
}
function undo() { if (historyIndex <= 0) return; historyIndex--; restore(history[historyIndex]); toast('Rückgängig'); }
function redo() { if (historyIndex >= history.length - 1) return; historyIndex++; restore(history[historyIndex]); toast('Wiederholt'); }

// ============================================================
// CANVAS EXPORT (sharp, native)
// ============================================================
async function renderToCanvas(outWidth) {
  await document.fonts.ready;
  const sw = stage.offsetWidth, sh = stage.offsetHeight;
  let W = outWidth, H;
  if (outWidth === 'native') { W = sw; H = sh; }
  else { W = parseInt(outWidth); H = Math.round(W * sh / sw); }
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = stage.style.background || '#ffffff';
  ctx.fillRect(0, 0, W, H);
  const scale = W / sw;

  const items = Array.from(stage.querySelectorAll('.item'));
  items.sort((a,b) => (parseInt(a.style.zIndex)||0) - (parseInt(b.style.zIndex)||0));

  for (const item of items) await renderItem(ctx, item, scale);
  return canvas;
}

async function renderItem(ctx, item, scale) {
  const x = parseFloat(item.style.left);
  const y = parseFloat(item.style.top);
  const w = item.offsetWidth;
  const h = item.offsetHeight;
  const cx = (x + w/2) * scale;
  const cy = (y + h/2) * scale;
  const sw = w * scale;
  const sh = h * scale;
  const rot = (parseFloat(item.dataset.rot) || 0) * Math.PI / 180;
  const fx = item.dataset.flipX === '1' ? -1 : 1;
  const fy = item.dataset.flipY === '1' ? -1 : 1;
  const opacity = parseFloat(item.style.opacity || '1');

  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.scale(fx, fy);

  const type = item.dataset.type;

  if (type === 'image') {
    const img = item.querySelector('img');
    if (!img.complete || !img.naturalWidth) {
      await new Promise(r => { img.onload = r; img.onerror = r; });
    }
    ctx.imageSmoothingEnabled = item.classList.contains('smooth');
    ctx.drawImage(img, -sw/2, -sh/2, sw, sh);
  } else if (type === 'text') {
    const tc = item.querySelector('.text-content');
    const fs = parseFloat(tc.style.fontSize) || 40;
    const ffRaw = tc.style.fontFamily || 'sans-serif';
    const ff = ffRaw; // keep quotes
    const color = tc.style.color || '#000';
    const align = tc.style.textAlign || 'left';
    const weight = tc.style.fontWeight || 'normal';
    ctx.font = `${weight} ${fs * scale}px ${ff}`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'top';
    ctx.textAlign = align === 'center' ? 'center' : align === 'right' ? 'right' : 'left';
    const raw = tc.innerText || tc.textContent || '';
    const lines = raw.split('\n');
    const lineHeight = fs * scale * 1.2;
    const tx = align === 'center' ? 0 : align === 'right' ? sw/2 : -sw/2;
    let ty = -sh/2;
    for (const line of lines) {
      ctx.fillText(line, tx, ty);
      ty += lineHeight;
    }
  } else if (type === 'rect') {
    const fill = item.dataset.fill || '#6b8fff';
    const stroke = item.dataset.stroke || '#000';
    const strokeW = (parseFloat(item.dataset.strokeW) || 0) * scale;
    const rad = (parseFloat(item.dataset.radius) || 0) * scale;
    ctx.fillStyle = fill;
    if (rad > 0 && ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(-sw/2, -sh/2, sw, sh, rad);
      ctx.fill();
      if (strokeW > 0) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
    } else {
      ctx.fillRect(-sw/2, -sh/2, sw, sh);
      if (strokeW > 0) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.strokeRect(-sw/2, -sh/2, sw, sh); }
    }
  } else if (type === 'circle') {
    const fill = item.dataset.fill || '#6b8fff';
    const stroke = item.dataset.stroke || '#000';
    const strokeW = (parseFloat(item.dataset.strokeW) || 0) * scale;
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.ellipse(0, 0, sw/2, sh/2, 0, 0, Math.PI*2);
    ctx.fill();
    if (strokeW > 0) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
  } else if (type === 'triangle') {
    const fill = item.dataset.fill || '#6b8fff';
    const stroke = item.dataset.stroke || '#000';
    const strokeW = (parseFloat(item.dataset.strokeW) || 0) * scale;
    const mx = p => (p/100 - 0.5) * sw;
    const my = p => (p/100 - 0.5) * sh;
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(mx(50), my(5));
    ctx.lineTo(mx(95), my(95));
    ctx.lineTo(mx(5), my(95));
    ctx.closePath();
    ctx.fill();
    if (strokeW > 0) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
  } else if (type === 'line') {
    ctx.fillStyle = item.dataset.fill || '#6b8fff';
    ctx.fillRect(-sw/2, -sh/2, sw, sh);
  }
  ctx.restore();
}

document.getElementById('btn-export').onclick = async () => {
  const prev = selected;
  select(null);
  await new Promise(r => requestAnimationFrame(r));
  try {
    const size = document.getElementById('export-size').value;
    const canvas = await renderToCanvas(size);
    const link = document.createElement('a');
    link.download = 'export_' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast('Gespeichert · ' + canvas.width + '×' + canvas.height);
  } catch (err) {
    console.error(err);
    alert('Export Fehler: ' + err.message);
  }
  if (prev && prev.isConnected) select(prev);
};

// ============================================================
// INIT
// ============================================================
renderImages();
renderFonts();
loadBuiltinImages();
pushHistory();
</script>
