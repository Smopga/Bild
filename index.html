<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Pixel Studio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Press+Start+2P&family=VT323&family=Silkscreen&family=Jersey+10&family=Pixelify+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07070e;
  --bg2:      #0b0b14;
  --panel:    #0f0f1a;
  --panel2:   #141420;
  --panel3:   #1c1c2a;
  --border:   #252535;
  --border-hi:#353548;
  --text:     #e8e8f2;
  --muted:    #5a5a72;
  --muted2:   #3e3e52;
  --accent:   #4f8eff;
  --accent-hi:#6fa4ff;
  --accent-lo:#2a5fcc;
  --accent-dim:rgba(79,142,255,0.12);
  --accent-glow:rgba(79,142,255,0.25);
  --danger:   #ff4455;
  --ok:       #3ecf7a;
  --warn:     #f0a030;
  --cyan:     #00d4cc;
  --radius:   6px;
  --font:     'IBM Plex Mono', 'Courier New', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; font-size: 12px; font-family: var(--font); }
body { display: flex; }
button { font-family: var(--font); font-size: inherit; color: inherit; cursor: pointer; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

/* ═══════════════════════ SIDEBAR ═══════════════════════ */
.sidebar {
  width: 280px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.brand {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #0f0f1e 0%, #0a0a16 100%);
}
.brand-mark {
  width: 26px; height: 26px;
  background: var(--accent);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-weight: 700;
  box-shadow: 0 0 14px var(--accent-glow), 0 0 4px var(--accent);
  flex-shrink: 0;
}
.brand-name {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--text);
  text-transform: uppercase;
}
.brand-sub {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.hint-bar {
  padding: 7px 16px;
  font-size: 9px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  letter-spacing: 0.3px;
}

.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px 4px;
  font-size: 9px;
  font-weight: 600;
  background: transparent;
  border: none;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 2px solid transparent;
  transition: all 0.12s;
  font-family: var(--font);
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: #aaa; background: rgba(255,255,255,0.03); }

.panel { flex: 1; overflow-y: auto; padding: 12px; display: none; }
.panel.active { display: block; }

/* Upload Button */
.upload-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 11px 14px;
  background: linear-gradient(135deg, var(--accent-lo), var(--accent));
  color: #fff; border: none; border-radius: var(--radius);
  font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 2px 12px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15);
}
.upload-btn:hover {
  background: linear-gradient(135deg, var(--accent), var(--accent-hi));
  box-shadow: 0 4px 20px rgba(79,142,255,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  transform: translateY(-1px);
}
.upload-btn input { display: none; }

/* Image Grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.thumb {
  position: relative; aspect-ratio: 1;
  border-radius: var(--radius); overflow: hidden;
  cursor: grab; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  background-color: #08080f;
  background-image: linear-gradient(45deg,#131320 25%,transparent 25%),
    linear-gradient(-45deg,#131320 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#131320 75%),
    linear-gradient(-45deg,transparent 75%,#131320 75%);
  background-size: 10px 10px;
  background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
  transition: all 0.12s;
}
.thumb img { width: 88%; height: 88%; object-fit: contain; image-rendering: pixelated; pointer-events: none; }
.thumb:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); transform: translateY(-1px); }
.thumb:active { cursor: grabbing; }
.thumb .del {
  position: absolute; top: 4px; right: 4px;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(0,0,0,0.85); color: #fff;
  border: 1px solid var(--border-hi); font-size: 12px;
  display: none; align-items: center; justify-content: center; line-height: 1;
}
.thumb:hover .del { display: flex; }
.thumb .del:hover { background: var(--danger); border-color: var(--danger); }
.thumb .badge {
  position: absolute; top: 3px; left: 3px;
  background: var(--accent); color: #fff;
  font-size: 8px; width: 16px; height: 16px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

/* Search */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap .search-ico { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); pointer-events: none; }
.search-wrap input {
  width: 100%; background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius);
  padding: 8px 28px 8px 28px; font-size: 11px;
  font-family: var(--font); outline: none; transition: border 0.12s;
}
.search-wrap input:focus { border-color: var(--accent); background: var(--panel3); }
.search-wrap input::placeholder { color: var(--muted2); }
.search-wrap #img-search-clear {
  position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; background: transparent; border: none;
  color: var(--muted); font-size: 15px; border-radius: 3px; display: none;
}
.search-wrap #img-search-clear.show { display: flex; align-items: center; justify-content: center; }
.search-wrap #img-search-clear:hover { color: var(--text); background: var(--panel3); }

/* Section Title */
.section-title {
  font-size: 9px; text-transform: uppercase; color: var(--muted);
  letter-spacing: 1.5px; margin: 16px 0 7px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-title:first-child { margin-top: 0; }

/* Tool Grid */
.tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
.tool-sq {
  aspect-ratio: 1;
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; position: relative; overflow: hidden;
}
.tool-sq::after {
  content: attr(title); position: absolute; bottom: 3px;
  font-size: 7px; color: var(--muted); font-family: var(--font);
  letter-spacing: 0.3px; white-space: nowrap;
}
.tool-sq:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-1px); box-shadow: 0 0 12px var(--accent-dim); }
.tool-sq span { line-height: 1; margin-bottom: 8px; }

/* Tool Buttons */
.tool-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 10px 12px; margin-bottom: 5px;
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius);
  text-align: left; font-size: 11px; font-weight: 500;
  font-family: var(--font); transition: all 0.12s;
}
.tool-btn:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateX(2px); }
.tool-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent-hi); box-shadow: inset 0 0 12px var(--accent-dim); }
.tool-btn .ico { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 14px; }

/* Font List */
.font-list { display: flex; flex-direction: column; gap: 5px; }
.font-item {
  position: relative; padding: 10px 12px;
  background: var(--panel2); border-radius: var(--radius);
  border: 1px solid var(--border); font-size: 17px;
  cursor: pointer; word-break: break-all; transition: all 0.12s;
}
.font-item:hover { border-color: var(--accent); background: var(--panel3); transform: translateX(2px); }
.font-item.builtin { border-left: 2px solid var(--accent-lo); }
.font-item .label { display: block; font-size: 9px; color: var(--muted); font-family: var(--font); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.font-item .del { position: absolute; top: 6px; right: 6px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #fff; border: 1px solid var(--border); font-size: 12px; display: none; font-family: var(--font); align-items: center; justify-content: center; }
.font-item:hover .del { display: flex; }

.empty { color: var(--muted); font-size: 10px; text-align: center; padding: 28px 10px; letter-spacing: 0.5px; }

/* ═══════════════════════ MAIN ═══════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.toolbar {
  min-height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 10px; gap: 4px; flex-wrap: wrap;
  position: relative;
}
.toolbar::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
}

.group {
  display: flex; align-items: center; gap: 5px;
  padding: 0 8px; height: 36px;
  border-right: 1px solid var(--border);
}
.group:last-of-type { border-right: none; }

.toolbar button {
  padding: 6px 10px;
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius);
  font-size: 11px; display: flex; align-items: center; gap: 4px;
  transition: all 0.12s; font-family: var(--font);
}
.toolbar button:hover { border-color: var(--border-hi); background: var(--panel3); }
.toolbar button.primary {
  background: linear-gradient(135deg, var(--accent-lo), var(--accent));
  border-color: var(--accent);
  color: #fff; font-weight: 600;
  box-shadow: 0 2px 10px var(--accent-glow);
}
.toolbar button.primary:hover {
  background: linear-gradient(135deg, var(--accent), var(--accent-hi));
  box-shadow: 0 4px 16px rgba(79,142,255,0.4);
}
.toolbar button.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,68,85,0.08); }
.toolbar button.icon { padding: 6px 8px; min-width: 30px; justify-content: center; font-size: 13px; }
.toolbar button.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent-hi); }

.toolbar input[type=color] { width: 30px; height: 26px; border: 1px solid var(--border); background: var(--panel2); border-radius: 4px; padding: 2px; cursor: pointer; }
.toolbar input[type=number] { width: 58px; background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 5px 7px; font-size: 11px; font-family: var(--font); outline: none; }
.toolbar input[type=number]:focus { border-color: var(--accent); }
.toolbar input[type=range] { width: 72px; padding: 0; accent-color: var(--accent); }
.toolbar select { background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 5px 7px; font-size: 11px; font-family: var(--font); outline: none; min-width: 120px; max-width: 160px; }
.toolbar select:focus { border-color: var(--accent); }
.toolbar label { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.toolbar #ctx-label { font-weight: 600; color: var(--text); min-width: 80px; font-size: 10px; letter-spacing: 0.5px; }
.spacer { flex: 1; }

/* Stage */
.stage-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 32px; overflow: auto; position: relative;
  background-color: var(--bg);
  background-image:
    linear-gradient(rgba(79,142,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
.stage-wrap::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 10%, rgba(79,142,255,0.05), transparent 60%),
              radial-gradient(ellipse at 80% 90%, rgba(0,212,204,0.03), transparent 60%);
}

.stage {
  position: relative; background: #ffffff;
  aspect-ratio: 16/9; width: min(92%, 1400px);
  box-shadow: 0 32px 100px rgba(0,0,0,0.8), 0 0 0 1px var(--border), 0 0 40px rgba(0,0,0,0.5);
  overflow: hidden; touch-action: none;
  transition: box-shadow 0.2s;
}
.stage.paint-mode, .stage.paint-mode * { cursor: crosshair !important; }
.stage.erase-mode, .stage.erase-mode * { cursor: cell !important; }
.stage.grid-on::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image: linear-gradient(rgba(0,0,0,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,0.07) 1px,transparent 1px);
  background-size: 40px 40px;
}

/* Paint Bar */
.paint-bar {
  position: fixed; left: 296px; top: 110px;
  background: var(--panel2); border: 1px solid var(--border-hi);
  border-radius: 10px; padding: 10px 14px;
  display: none; gap: 10px; align-items: center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.7); z-index: 200;
}
.paint-bar.open { display: flex; }
.paint-bar label { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.paint-bar input[type=range] { width: 90px; accent-color: var(--accent); }
.paint-bar input[type=color] { width: 30px; height: 26px; border: 1px solid var(--border); background: var(--panel); border-radius: 4px; padding: 2px; }
.paint-bar button { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 6px 11px; border-radius: var(--radius); font-size: 10px; font-weight: 600; font-family: var(--font); }
.paint-bar button:hover { border-color: var(--accent); }

/* Guides */
.guide { position: absolute; background: #ff00ff; pointer-events: none; z-index: 999; box-shadow: 0 0 6px #ff00ff; }
.guide.v { width: 1px; top: 0; bottom: 0; }
.guide.h { height: 1px; left: 0; right: 0; }

/* ═══════════════════════ ITEMS ═══════════════════════ */
.item { position: absolute; user-select: none; transform-origin: center center; touch-action: none; }
.item.locked { cursor: not-allowed !important; }
.item .inner { width: 100%; height: 100%; pointer-events: none; }
.item.selected > .inner { outline: 2px solid var(--accent); outline-offset: 0; }
.item.locked.selected > .inner { outline-color: var(--warn); outline-style: dashed; }
.item img { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; -ms-interpolation-mode: nearest-neighbor; }
.item.smooth img { image-rendering: auto; }
.item .text-content { width: 100%; height: 100%; outline: none; white-space: pre-wrap; overflow: hidden; word-break: break-word; }
.item.editing { cursor: text; }
.item.editing .text-content { pointer-events: auto !important; user-select: text; }
.item .shape { width: 100%; height: 100%; }
.item.shadowed .inner { filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.55)); }

/* Handles */
.handle {
  position: absolute; width: 10px; height: 10px;
  background: #fff; border: 2px solid var(--accent);
  border-radius: 2px; z-index: 100;
  box-shadow: 0 1px 5px rgba(0,0,0,0.5);
}
.handle.tl { left: -6px; top: -6px; cursor: nwse-resize; }
.handle.tr { right: -6px; top: -6px; cursor: nesw-resize; }
.handle.bl { left: -6px; bottom: -6px; cursor: nesw-resize; }
.handle.br { right: -6px; bottom: -6px; cursor: nwse-resize; }
.handle.t  { left: calc(50% - 5px); top: -6px; cursor: ns-resize; }
.handle.b  { left: calc(50% - 5px); bottom: -6px; cursor: ns-resize; }
.handle.l  { left: -6px; top: calc(50% - 5px); cursor: ew-resize; }
.handle.r  { right: -6px; top: calc(50% - 5px); cursor: ew-resize; }
.handle.rot {
  left: calc(50% - 6px); top: -32px;
  background: var(--ok); border-color: #fff; border-radius: 50%;
  cursor: grab; width: 12px; height: 12px;
  box-shadow: 0 0 8px var(--ok);
}
.handle.rot::after { content:''; position: absolute; top: 9px; left: calc(50% - 1px); width: 1px; height: 18px; background: var(--ok); opacity: 0.6; }

/* ═══════════════════════ CTX MENU ═══════════════════════ */
.ctx-menu {
  position: fixed; background: var(--panel2);
  border: 1px solid var(--border-hi); border-radius: 10px;
  padding: 5px; min-width: 210px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.03);
  z-index: 10000; display: none;
}
.ctx-menu.open { display: block; animation: fadeUp 0.1s ease-out; }
@keyframes fadeUp { from { opacity: 0; transform: scale(0.95) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.ctx-menu button {
  display: flex; align-items: center; gap: 9px; width: 100%;
  padding: 8px 11px; background: transparent; border: none;
  color: var(--text); font-size: 11px; border-radius: 6px; text-align: left;
  font-family: var(--font); transition: all 0.08s;
}
.ctx-menu button:hover { background: var(--accent); color: #fff; }
.ctx-menu button.danger:hover { background: var(--danger); }
.ctx-menu button .shortcut { margin-left: auto; color: var(--muted); font-size: 9px; }
.ctx-menu button:hover .shortcut { color: rgba(255,255,255,0.75); }
.ctx-menu button .ico { width: 14px; text-align: center; font-size: 12px; }
.ctx-menu .sep { height: 1px; background: var(--border); margin: 4px 5px; }

/* ═══════════════════════ TOAST ═══════════════════════ */
.toast {
  position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
  background: var(--panel2); border: 1px solid var(--accent);
  color: var(--text); padding: 8px 16px; border-radius: 20px;
  font-size: 11px; letter-spacing: 0.3px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 12px var(--accent-dim);
  z-index: 5000; opacity: 0; pointer-events: none;
  transition: opacity 0.18s, transform 0.18s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }

/* ═══════════════════════ INFO BAR ═══════════════════════ */
.info {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(7,7,14,0.88); backdrop-filter: blur(10px);
  color: var(--muted); padding: 6px 14px; border-radius: 20px;
  font-size: 9px; border: 1px solid var(--border); pointer-events: none; z-index: 500;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<div class="sidebar">
  <div class="brand">
    <div class="brand-mark">P</div>
    <div>
      <div class="brand-name">Pixel Studio</div>
      <div class="brand-sub">v2.0 · Session only</div>
    </div>
  </div>
  <div class="hint-bar">⚠ Bilder & Fonts werden beim Reload gelöscht</div>
  <div class="tabs">
    <button class="tab active" data-tab="images">Bilder</button>
    <button class="tab" data-tab="fonts">Fonts</button>
    <button class="tab" data-tab="tools">Werkzeuge</button>
  </div>

  <div class="panel active" id="panel-images">
    <label class="upload-btn">↑ Bilder hochladen
      <input type="file" id="img-upload" accept="image/*" multiple>
    </label>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input type="text" id="img-search" placeholder="Suchen…" autocomplete="off">
      <button id="img-search-clear" title="Löschen">×</button>
    </div>
    <div class="grid" id="img-grid"></div>
  </div>

  <div class="panel" id="panel-fonts">
    <label class="upload-btn">↑ Font hochladen
      <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" multiple>
    </label>
    <div class="section-title">Eingebaut · Pixel / Retro</div>
    <div class="font-list" id="builtin-fonts"></div>
    <div class="section-title">Hochgeladen</div>
    <div class="font-list" id="font-list"></div>
  </div>

  <div class="panel" id="panel-tools">
    <div class="section-title">Formen</div>
    <div class="tool-grid">
      <button class="tool-sq" data-add="text" title="Text"><span>T</span></button>
      <button class="tool-sq" data-add="rect" title="Rechteck"><span>▢</span></button>
      <button class="tool-sq" data-add="circle" title="Kreis"><span>●</span></button>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const stage = document.getElementById('stage');
const ctxMenu = document.getElementById('ctx-menu');

let uid = 0;
let zCounter = 1;
let clipboard = null;
let history = [];
let historyIndex = -1;

const standardFonts = ['Arial','Helvetica','Times New Roman','Courier New','Georgia','Verdana','Impact','Comic Sans MS'];
const pixelFonts = [
  { family: 'Press Start 2P', label: 'Minecraft-Style' },
  { family: 'Jersey 10',      label: 'Blocky Bold' },
  { family: 'Pixelify Sans',  label: 'Pixelify' },
  { family: 'VT323',          label: 'Terminal Retro' },
  { family: 'Silkscreen',     label: 'Silkscreen Pixel' },
];
let customFonts = [];

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
const toastEl = document.getElementById('toast');
let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
}

// ═══════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-' + t.dataset.tab).classList.add('active');
});

// ═══════════════════════════════════════════════════════════
// IMAGES
// ═══════════════════════════════════════════════════════════
const imgGrid = document.getElementById('img-grid');
const imgSearchInput = document.getElementById('img-search');
const imgSearchClear = document.getElementById('img-search-clear');
let imageCache = [];
let imgFilter = '';

function renderImages() {
  imgGrid.innerHTML = '';
  const filter = imgFilter.toLowerCase().trim();
  const filtered = filter ? imageCache.filter(i => i.name.toLowerCase().includes(filter)) : imageCache;
  if (!imageCache.length) { imgGrid.innerHTML = '<div class="empty">Noch keine Bilder</div>'; return; }
  if (!filtered.length) { imgGrid.innerHTML = '<div class="empty">Keine Treffer für "'+filter+'"</div>'; return; }
  filtered.forEach(img => {
    const idx = imageCache.indexOf(img);
    const d = document.createElement('div');
    d.className = 'thumb';
    d.draggable = true;
    const delBtn = img.builtin ? '' : '<button class="del" title="Löschen">×</button>';
    const badge = img.builtin ? '<div class="badge">★</div>' : '';
    d.innerHTML = `<img src="${img.url}" crossorigin="anonymous">${badge}${delBtn}`;
    d.title = img.name + (img.builtin ? ' (mitgeliefert)' : '');
    d.addEventListener('dragstart', e => {
      e.dataTransfer.setData('type', 'image');
      e.dataTransfer.setData('url', img.url);
      e.dataTransfer.effectAllowed = 'copy';
    });
    d.addEventListener('dblclick', e => { if (e.target.tagName !== 'BUTTON') addImage(img.url); });
    if (!img.builtin) {
      d.querySelector('.del').onclick = e => {
        e.stopPropagation();
        URL.revokeObjectURL(img.url);
        imageCache.splice(idx, 1);
        renderImages();
      };
    }
    imgGrid.appendChild(d);
  });
}

imgSearchInput.addEventListener('input', e => {
  imgFilter = e.target.value;
  imgSearchClear.classList.toggle('show', !!imgFilter);
  renderImages();
});
imgSearchClear.onclick = () => {
  imgSearchInput.value = '';
  imgFilter = '';
  imgSearchClear.classList.remove('show');
  renderImages();
  imgSearchInput.focus();
};

async function loadBuiltinImages() {
  const imgExts = /\.(png|jpe?g|gif|webp|svg|bmp)$/i;
  const host = location.hostname;
  const ghMatch = host.match(/^([^.]+)\.github\.io$/i);
  if (ghMatch) {
    const user = ghMatch[1];
    const seg = location.pathname.split('/').filter(Boolean);
    const repo = seg[0] || user + '.github.io';
    try {
      const api = `https://api.github.com/repos/${user}/${repo}/contents/images`;
      const r = await fetch(api, { cache: 'no-cache' });
      if (r.ok) {
        const list = await r.json();
        if (Array.isArray(list)) {
          const imgs = list.filter(f => f.type === 'file' && imgExts.test(f.name));
          for (const f of imgs) imageCache.push({ name: f.name, url: f.download_url || ('images/' + f.name), builtin: true });
          if (imgs.length) { renderImages(); return; }
        }
      }
    } catch(e) {}
  }
  try {
    const r = await fetch('images/manifest.json', { cache: 'no-cache' });
    if (!r.ok) return;
    const list = await r.json();
    if (!Array.isArray(list)) return;
    for (const name of list) if (imgExts.test(name)) imageCache.push({ name, url: 'images/' + name, builtin: true });
    renderImages();
  } catch(e) {}
}

document.getElementById('img-upload').addEventListener('change', e => {
  for (const file of e.target.files) imageCache.push({ name: file.name, url: URL.createObjectURL(file), builtin: false });
  renderImages();
  toast(e.target.files.length + ' Bild(er) geladen');
  e.target.value = '';
});

// ═══════════════════════════════════════════════════════════
// FONTS
// ═══════════════════════════════════════════════════════════
const fontList = document.getElementById('font-list');
const builtinList = document.getElementById('builtin-fonts');
const fontSelect = document.getElementById('ctx-font');

function renderBuiltin() {
  builtinList.innerHTML = '';
  pixelFonts.forEach(f => {
    const d = document.createElement('div');
    d.className = 'font-item builtin';
    d.style.fontFamily = `'${f.family}', monospace`;
    d.innerHTML = `Abc 123<span class="label">${f.label}</span>`;
    builtinList.appendChild(d);
  });
}
renderBuiltin();

function rebuildFontSelect() {
  fontSelect.innerHTML = '';
  const gPixel = document.createElement('optgroup'); gPixel.label = '▪ Pixel / Retro';
  pixelFonts.forEach(f => { const o = document.createElement('option'); o.value = f.family; o.textContent = f.family; gPixel.appendChild(o); });
  fontSelect.appendChild(gPixel);
  const gStd = document.createElement('optgroup'); gStd.label = 'Standard';
  standardFonts.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; gStd.appendChild(o); });
  fontSelect.appendChild(gStd);
  if (customFonts.length) {
    const gC = document.createElement('optgroup'); gC.label = 'Eigene';
    customFonts.forEach(f => { const o = document.createElement('option'); o.value = f.family; o.textContent = f.name; gC.appendChild(o); });
    fontSelect.appendChild(gC);
  }
}
rebuildFontSelect();

function renderFonts() {
  fontList.innerHTML = '';
  if (!customFonts.length) { fontList.innerHTML = '<div class="empty">Noch keine Fonts</div>'; rebuildFontSelect(); return; }
  customFonts.forEach((f, idx) => {
    const d = document.createElement('div');
    d.className = 'font-item';
    d.style.fontFamily = f.family;
    d.innerHTML = `Abc 123<span class="label">${f.name}</span><button class="del">×</button>`;
    d.querySelector('.del').onclick = e => {
      e.stopPropagation();
      try { document.fonts.delete(f.face); } catch(_) {}
      customFonts.splice(idx, 1);
      renderFonts();
    };
    fontList.appendChild(d);
  });
  rebuildFontSelect();
}

document.getElementById('font-upload').addEventListener('change', async e => {
  for (const file of e.target.files) {
    const family = 'cf_' + file.name.replace(/[^a-z0-9]/gi, '_') + '_' + Date.now();
    const buf = await file.arrayBuffer();
    const face = new FontFace(family, buf);
    try { await face.load(); document.fonts.add(face); customFonts.push({ family, name: file.name, face }); }
    catch(err) { console.error('font load fail', err); }
  }
  renderFonts();
  toast(e.target.files.length + ' Font(s) geladen');
  e.target.value = '';
});

// ═══════════════════════════════════════════════════════════
// ITEM FACTORY
// ═══════════════════════════════════════════════════════════
function bindItem(el) {
  el.addEventListener('pointerdown', onItemPointerDown);
  el.addEventListener('contextmenu', onItemContextMenu);
  if (el.dataset.type === 'text') {
    el.addEventListener('dblclick', onTextDblClick);
    const tc = el.querySelector('.text-content');
    if (tc) tc.addEventListener('blur', () => {
      el.classList.remove('editing');
      tc.contentEditable = 'false';
      pushHistory();
    });
  }
}

function makeItem(type, x, y, w, h) {
  const el = document.createElement('div');
  el.className = 'item';
  el.dataset.type = type;
  el.dataset.id = ++uid;
  el.dataset.rot = '0';
  el.dataset.flipX = '0';
  el.dataset.flipY = '0';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  el.style.zIndex = ++zCounter;
  el.style.opacity = '1';
  applyTransform(el);
  const inner = document.createElement('div');
  inner.className = 'inner';
  el.appendChild(inner);
  stage.appendChild(el);
  bindItem(el);
  return el;
}

function applyTransform(el) {
  const rot = parseFloat(el.dataset.rot) || 0;
  const fx = el.dataset.flipX === '1' ? -1 : 1;
  const fy = el.dataset.flipY === '1' ? -1 : 1;
  el.style.transform = `rotate(${rot}deg) scale(${fx}, ${fy})`;
}

function addImage(url, x, y, cb) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const stageW = stage.offsetWidth, stageH = stage.offsetHeight;
    const maxW = stageW * 0.6, maxH = stageH * 0.8;
    const targetW = stageW * 0.25;
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w < targetW) { const mult = Math.max(1, Math.floor(targetW / w)); w *= mult; h *= mult; }
    if (w > maxW) { const s = maxW / w; w *= s; h *= s; }
    if (h > maxH) { const s = maxH / h; w *= s; h *= s; }
    const px = x != null ? x - w/2 : (stageW/2 - w/2);
    const py = y != null ? y - h/2 : (stageH/2 - h/2);
    const el = makeItem('image', px, py, w, h);
    const i = document.createElement('img');
    i.src = url; i.crossOrigin = 'anonymous'; i.draggable = false;
    el.querySelector('.inner').appendChild(i);
    select(el); pushHistory();
    if (cb) cb(el);
  };
  img.src = url;
}

function addText(x, y, opts = {}) {
  const w = opts.w || 500, h = opts.h || 100;
  const px = x != null ? x : (stage.offsetWidth/2 - w/2);
  const py = y != null ? y : (stage.offsetHeight/2 - h/2);
  const el = makeItem('text', px, py, w, h);
  const tc = document.createElement('div');
  tc.className = 'text-content';
  tc.style.fontFamily = `'${opts.font || 'Press Start 2P'}'`;
  tc.style.fontSize = (opts.size || 40) + 'px';
  tc.style.color = opts.color || '#000000';
  tc.style.textAlign = opts.align || 'left';
  if (opts.bold) tc.style.fontWeight = 'bold';
  tc.textContent = opts.text || 'TEXT';
  el.querySelector('.inner').appendChild(tc);
  bindItem(el); select(el); pushHistory();
  return el;
}

// SVG path generators (0–100 coordinate space)
const SVG_PATHS = {
  triangle: () => 'M50,5 L95,95 L5,95 Z',
  star: () => {
    const cx=50,cy=50,r=47,ri=19; let d='';
    for(let i=0;i<10;i++){const a=(Math.PI*i)/5-Math.PI/2;const rad=i%2===0?r:ri;d+=(i===0?'M':'L')+(cx+rad*Math.cos(a)).toFixed(2)+','+(cy+rad*Math.sin(a)).toFixed(2)+' ';}
    return d+'Z';
  },
  heart: () => 'M50,90 C10,60 -5,25 50,30 C105,25 90,60 50,90 Z',
  arrow: () => 'M0,35 L65,35 L65,15 L100,50 L65,85 L65,65 L0,65 Z',
  bubble: () => 'M10,5 L85,5 Q95,5 95,15 L95,65 Q95,75 85,75 L40,75 L25,95 L30,75 L15,75 Q5,75 5,65 L5,15 Q5,5 15,5 Z',
  pentagon: () => {
    const cx=50,cy=50,r=47; let d='';
    for(let i=0;i<5;i++){const a=(Math.PI*2*i)/5-Math.PI/2;d+=(i===0?'M':'L')+(cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2)+' ';}
    return d+'Z';
  },
  hexagon: () => {
    const cx=50,cy=50,r=47; let d='';
    for(let i=0;i<6;i++){const a=(Math.PI*2*i)/6;d+=(i===0?'M':'L')+(cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2)+' ';}
    return d+'Z';
  },
};
const PATH_SHAPES = Object.keys(SVG_PATHS);

function addShape(kind, x, y, opts = {}) {
  const w = opts.w || 200, h = opts.h || (kind==='line'?6:200);
  const px = x != null ? x : (stage.offsetWidth/2 - w/2);
  const py = y != null ? y : (stage.offsetHeight/2 - h/2);
  const el = makeItem(kind, px, py, w, h);
  const inner = el.querySelector('.inner');
  el.dataset.fill = opts.fill || '#4f8eff';
  el.dataset.stroke = opts.stroke || '#000000';
  el.dataset.strokeW = opts.strokeW || '0';
  el.dataset.radius = opts.radius || '0';
  if (PATH_SHAPES.includes(kind)) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 100 100');
    svg.setAttribute('preserveAspectRatio','none');
    svg.style.width='100%'; svg.style.height='100%'; svg.style.overflow='visible';
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', SVG_PATHS[kind]());
    path.setAttribute('fill', el.dataset.fill);
    path.setAttribute('stroke', el.dataset.stroke);
    path.setAttribute('stroke-width', el.dataset.strokeW);
    path.setAttribute('vector-effect','non-scaling-stroke');
    svg.appendChild(path); inner.appendChild(svg);
  } else {
    const sh = document.createElement('div');
    sh.className = 'shape';
    sh.style.background = el.dataset.fill;
    if (kind === 'circle') sh.style.borderRadius = '50%';
    else if (kind === 'rect' && parseFloat(el.dataset.radius) > 0) sh.style.borderRadius = el.dataset.radius + 'px';
    if (parseFloat(el.dataset.strokeW) > 0) sh.style.border = `${el.dataset.strokeW}px solid ${el.dataset.stroke}`;
    inner.appendChild(sh);
  }
  select(el); pushHistory();
  return el;
}

document.querySelectorAll('[data-add]').forEach(b => b.onclick = () => {
  const t = b.dataset.add;
  if (t === 'text') addText(); else addShape(t);
});

// ═══════════════════════════════════════════════════════════
// SELECTION
// ═══════════════════════════════════════════════════════════
function clearHandles() { document.querySelectorAll('.item .handle').forEach(h => h.remove()); }

function select(el) {
  if (selected) selected.classList.remove('selected');
  clearHandles();
  selected = el;
  if (el) {
    el.classList.add('selected');
    if (!el.dataset.locked) {
      ['tl','tr','bl','br','t','b','l','r'].forEach(pos => {
        const h = document.createElement('div');
        h.className = 'handle ' + pos;
        el.appendChild(h);
        h.addEventListener('pointerdown', ev => startResize(ev, pos));
      });
      const r = document.createElement('div');
      r.className = 'handle rot';
      el.appendChild(r);
      r.addEventListener('pointerdown', startRotate);
    }
  }
  updateToolbar();
}

function updateToolbar() {
  const tText  = document.getElementById('ctx-text');
  const tShape = document.getElementById('ctx-shape');
  const tImg   = document.getElementById('ctx-image');
  const tComm  = document.getElementById('ctx-common');
  const tAlign = document.getElementById('ctx-aligngroup');
  const lbl    = document.getElementById('ctx-label');
  tText.style.display='none'; tShape.style.display='none';
  tImg.style.display='none'; tComm.style.display='none'; tAlign.style.display='none';
  if (!selected) { lbl.textContent = 'Nichts gewählt'; return; }
  const type = selected.dataset.type;
  lbl.textContent = '● ' + type.toUpperCase() + (selected.dataset.locked ? ' 🔒' : '');
  tComm.style.display = 'flex';
  tAlign.style.display = 'flex';
  document.getElementById('ctx-rot').value = Math.round(parseFloat(selected.dataset.rot)||0);
  document.getElementById('ctx-opacity').value = Math.round((parseFloat(selected.style.opacity)||1)*100);
  // Shadow button state
  const shadowBtn = document.getElementById('ctx-shadow');
  shadowBtn.classList.toggle('active', selected.classList.contains('shadowed'));

  if (type === 'text') {
    tText.style.display = 'flex';
    const tc = selected.querySelector('.text-content');
    const ff = (tc.style.fontFamily||'').replace(/['"]/g,'').split(',')[0].trim();
    document.getElementById('ctx-font').value = ff;
    document.getElementById('ctx-size').value = parseInt(tc.style.fontSize)||40;
    document.getElementById('ctx-color').value = rgbToHex(tc.style.color)||'#000000';
    document.getElementById('ctx-align').value = tc.style.textAlign||'left';
  } else if (type === 'image') {
    tImg.style.display = 'flex';
    document.getElementById('ctx-pixelated').checked = !selected.classList.contains('smooth');
  } else {
    tShape.style.display = 'flex';
    document.getElementById('ctx-fill').value = selected.dataset.fill||'#4f8eff';
    document.getElementById('ctx-stroke').value = selected.dataset.stroke||'#000000';
    document.getElementById('ctx-stroke-w').value = selected.dataset.strokeW||0;
    document.getElementById('ctx-radius').value = selected.dataset.radius||0;
    document.getElementById('ctx-radius-label').style.display = type==='rect' ? 'flex' : 'none';
  }
}

function rgbToHex(rgb) {
  if (!rgb) return null;
  if (rgb.startsWith('#')) return rgb;
  const m = rgb.match(/\d+/g);
  if (!m) return null;
  return '#' + m.slice(0,3).map(x => (+x).toString(16).padStart(2,'0')).join('');
}

function showGuides(lines) {
  document.querySelectorAll('.guide').forEach(g => g.remove());
  lines.forEach(L => {

    g.className = 'guide ' + L.type;

function clearGuides() { document.querySelectorAll('.guide').forEach(g => g.remove()); }

function startDrag(e, el) {
  e.preventDefault();
  const sx=e.clientX, sy=e.clientY;
  const ox=parseFloat(el.style.left), oy=parseFloat(el.style.top);
  const pointerId=e.pointerId;
  try { el.setPointerCapture(pointerId); } catch(_){}
  let moved=false;
  function mv(ev){
    if(ev.pointerId!==pointerId) return;
    const dx=ev.clientX-sx, dy=ev.clientY-sy;
    if(!moved&&Math.abs(dx)+Math.abs(dy)<2) return;
    moved=true;
    let nx=ox+dx, ny=oy+dy;
    const w=el.offsetWidth, h=el.offsetHeight;
    const sw=stage.offsetWidth, sh=stage.offsetHeight;
    const cx=nx+w/2, cy=ny+h/2;
    const guides=[]; const SNAP=6;
    if(Math.abs(cx-sw/2)<SNAP){nx=sw/2-w/2;guides.push({type:'v',pos:sw/2});}
    if(Math.abs(cy-sh/2)<SNAP){ny=sh/2-h/2;guides.push({type:'h',pos:sh/2});}
    if(Math.abs(nx)<SNAP){nx=0;guides.push({type:'v',pos:0});}
    if(Math.abs(ny)<SNAP){ny=0;guides.push({type:'h',pos:0});}
    if(Math.abs(nx+w-sw)<SNAP){nx=sw-w;guides.push({type:'v',pos:sw});}
    if(Math.abs(ny+h-sh)<SNAP){ny=sh-h;guides.push({type:'h',pos:sh});}
    el.style.left=nx+'px'; el.style.top=ny+'px';
    showGuides(guides);
  }
  function up(ev){
    if(ev.pointerId!==pointerId) return;
    el.removeEventListener('pointermove',mv); el.removeEventListener('pointerup',up); el.removeEventListener('pointercancel',up);
    try{el.releasePointerCapture(pointerId);}catch(_){}
    clearGuides();
    if(moved) pushHistory();
  }
  el.addEventListener('pointermove',mv); el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
}

function startResize(e, pos) {
  e.stopPropagation(); e.preventDefault();
  const el=selected;
  const rot=(parseFloat(el.dataset.rot)||0)*Math.PI/180;
  const cos=Math.cos(rot), sin=Math.sin(rot);
  const startX=e.clientX, startY=e.clientY;
  const ow=el.offsetWidth, oh=el.offsetHeight;
  const ol=parseFloat(el.style.left), ot=parseFloat(el.style.top);
  const cx=ol+ow/2, cy=ot+oh/2;
  const pointerId=e.pointerId;
  const handle=e.currentTarget;
  try{handle.setPointerCapture(pointerId);}catch(_){}
  function mv(ev){
    if(ev.pointerId!==pointerId) return;
    const dx=ev.clientX-startX, dy=ev.clientY-startY;
    const lx=dx*cos+dy*sin, ly=-dx*sin+dy*cos;
    let nw=ow, nh=oh, dlx=0, dly=0;
    if(pos.includes('r')) nw=Math.max(10,ow+lx);
    if(pos.includes('l')){nw=Math.max(10,ow-lx);dlx=lx;}
    if(pos.includes('b')) nh=Math.max(10,oh+ly);
    if(pos.includes('t')){nh=Math.max(10,oh-ly);dly=ly;}
    const ddx=dlx/2, ddy=dly/2;
    const wx=ddx*cos-ddy*sin, wy=ddx*sin+ddy*cos;
    el.style.width=nw+'px'; el.style.height=nh+'px';
    el.style.left=(cx+wx-nw/2)+'px'; el.style.top=(cy+wy-nh/2)+'px';
  }
  function up(ev){
    if(ev.pointerId!==pointerId) return;
    handle.removeEventListener('pointermove',mv); handle.removeEventListener('pointerup',up); handle.removeEventListener('pointercancel',up);
    try{handle.releasePointerCapture(pointerId);}catch(_){}
    pushHistory();
  }
  handle.addEventListener('pointermove',mv); handle.addEventListener('pointerup',up); handle.addEventListener('pointercancel',up);
}

function startRotate(e) {
  e.stopPropagation(); e.preventDefault();
  const el=selected;
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const startAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI;
  const startRot=parseFloat(el.dataset.rot)||0;
  const pointerId=e.pointerId;
  const handle=e.currentTarget;
  try{handle.setPointerCapture(pointerId);}catch(_){}
  function mv(ev){
    if(ev.pointerId!==pointerId) return;
    let r=startRot+(Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI-startAngle);
    if(ev.shiftKey) r=Math.round(r/15)*15;
    el.dataset.rot=r; applyTransform(el);
    document.getElementById('ctx-rot').value=Math.round(r);
  }
  function up(ev){
    if(ev.pointerId!==pointerId) return;
    handle.removeEventListener('pointermove',mv); handle.removeEventListener('pointerup',up); handle.removeEventListener('pointercancel',up);
    try{handle.releasePointerCapture(pointerId);}catch(_){}
    pushHistory();
  }
  handle.addEventListener('pointermove',mv); handle.addEventListener('pointerup',up); handle.addEventListener('pointercancel',up);
}

// ACTIONS
// ═══════════════════════════════════════════════════════════
function doAction(act){
  if(!selected&&!['paste'].includes(act)) return;
  switch(act){
    case 'duplicate': duplicateItem(); break;
    case 'copy': clipboard=selected.outerHTML; toast('Kopiert'); break;
    case 'paste': pasteItem(); break;
    case 'delete': selected.remove(); select(null); pushHistory(); break;
    case 'front': selected.style.zIndex=++zCounter; pushHistory(); break;
    case 'back':
      zCounter++;
      document.querySelectorAll('.item').forEach(i=>{if(i!==selected) i.style.zIndex=(parseInt(i.style.zIndex)||0)+1;});
      selected.style.zIndex=1; pushHistory(); break;
    case 'flipx': selected.dataset.flipX=selected.dataset.flipX==='1'?'0':'1'; applyTransform(selected); pushHistory(); break;
    case 'flipy': selected.dataset.flipY=selected.dataset.flipY==='1'?'0':'1'; applyTransform(selected); pushHistory(); break;
    case 'reset-rot': selected.dataset.rot='0'; applyTransform(selected); updateToolbar(); pushHistory(); break;
    case 'shadow':
      selected.classList.toggle('shadowed');
      updateToolbar(); pushHistory(); break;
    case 'lock':
      if(selected.dataset.locked){delete selected.dataset.locked;selected.classList.remove('locked');}
      else{selected.dataset.locked='1';selected.classList.add('locked');}
      select(selected); break;
  }
}

function duplicateItem(){
  if(!selected) return;
  const clone=selected.cloneNode(true);
  clone.classList.remove('selected');
  clone.querySelectorAll('.handle').forEach(h=>h.remove());
  clone.dataset.id=++uid;
  clone.style.left=(parseFloat(selected.style.left)+20)+'px';
  clone.style.top=(parseFloat(selected.style.top)+20)+'px';
  clone.style.zIndex=++zCounter;
  stage.appendChild(clone); bindItem(clone); select(clone); pushHistory(); toast('Dupliziert');
}

function pasteItem(){
  if(!clipboard) return;
  const tmp=document.createElement('div');
  tmp.innerHTML=clipboard;
  const el=tmp.firstElementChild;
  if(!el) return;
  el.classList.remove('selected');
  el.querySelectorAll('.handle').forEach(h=>h.remove());
  el.dataset.id=++uid;
  el.style.left=(parseFloat(el.style.left)+30)+'px';
  el.style.top=(parseFloat(el.style.top)+30)+'px';
  el.style.zIndex=++zCounter;
  stage.appendChild(el); bindItem(el); select(el); pushHistory(); toast('Eingefügt');
}

// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  const tag=document.activeElement.tagName;
  const inInput=tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA';
  const inEdit=!!document.querySelector('.item.editing');
  if(inInput||inEdit) return;
  const ctrl=e.ctrlKey||e.metaKey;
  if(ctrl&&e.key.toLowerCase()==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
  if(ctrl&&(e.key.toLowerCase()==='y'||(e.key.toLowerCase()==='z'&&e.shiftKey))){e.preventDefault();redo();return;}
  if(ctrl&&e.key.toLowerCase()==='d'&&selected){e.preventDefault();duplicateItem();return;}
  if(ctrl&&e.key.toLowerCase()==='c'&&selected){e.preventDefault();clipboard=selected.outerHTML;toast('Kopiert');return;}
  if(ctrl&&e.key.toLowerCase()==='v'&&clipboard){e.preventDefault();pasteItem();return;}
  if(!selected) return;
  if(selected.dataset.locked) return;
  if(e.key==='Delete'||e.key==='Backspace'){selected.remove();select(null);pushHistory();e.preventDefault();return;}
  const step=e.shiftKey?10:1; let moved=false;
  if(e.key==='ArrowLeft'){selected.style.left=(parseFloat(selected.style.left)-step)+'px';moved=true;}
  else if(e.key==='ArrowRight'){selected.style.left=(parseFloat(selected.style.left)+step)+'px';moved=true;}
  else if(e.key==='ArrowUp'){selected.style.top=(parseFloat(selected.style.top)-step)+'px';moved=true;}
  else if(e.key==='ArrowDown'){selected.style.top=(parseFloat(selected.style.top)+step)+'px';moved=true;}
  if(moved){e.preventDefault();debouncedHistory();}
});

let histTimer;
function debouncedHistory(){clearTimeout(histTimer);histTimer=setTimeout(pushHistory,400);}

stage.addEventListener('wheel', e=>{

  const ol=parseFloat(selected.style.left), ot=parseFloat(selected.style.top);

  selected.style.top=(ot+(selected.offsetHeight-h)/2)+'px';
  selected.style.width=w+'px'; selected.style.height=h+'px';
  debouncedHistory();
},{passive:false});

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function snapshot(){return{html:stage.innerHTML,bg:stage.style.background||'#ffffff'};}
function pushHistory(){
  if(suppressHistory) return;
  history=history.slice(0,historyIndex+1);
  history.push(snapshot());
  if(history.length>60) history.shift();
  historyIndex=history.length-1;
}
function restore(snap){
  suppressHistory=true;
  stage.innerHTML=snap.html;
  stage.style.background=snap.bg;
  selected=null;
  stage.querySelectorAll('.item').forEach(el=>{
    el.querySelectorAll('.handle').forEach(h=>h.remove());
    el.querySelectorAll('.guide').forEach(g=>g.remove());
    el.classList.remove('selected');
    bindItem(el);
    const z=parseInt(el.style.zIndex)||0;
    if(z>zCounter) zCounter=z;
  });
  stage.querySelectorAll('.guide').forEach(g=>g.remove());
  updateToolbar(); suppressHistory=false;
}
function undo(){if(historyIndex<=0)return;historyIndex--;restore(history[historyIndex]);toast('Rückgängig');}
function redo(){if(historyIndex>=history.length-1)return;historyIndex++;restore(history[historyIndex]);toast('Wiederholt');}

// ═══════════════════════════════════════════════════════════
// TEXT CONTENT HELPER (FIX: multi-line export)
// ═══════════════════════════════════════════════════════════
function getTextLines(tc) {
  // Parse innerHTML to reliably extract lines, handling <br>, <div>, <p>
  let html = tc.innerHTML;
  // Collapse empty-div newlines like <div><br></div>
  html = html.replace(/<div><br\s*\/?><\/div>/gi, '\n');
  // <br> → newline
  html = html.replace(/<br\s*\/?>/gi, '\n');
  // closing block tags → newline
  html = html.replace(/<\/(div|p|li|h[1-6])>/gi, '\n');
  // strip remaining tags
  html = html.replace(/<[^>]+>/g, '');
  // decode entities
  html = html.replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'");
  // trim leading/trailing newlines
  return html.replace(/^\n+|\n+$/g, '').split('\n');
}

// ═══════════════════════════════════════════════════════════
// CANVAS EXPORT
// ═══════════════════════════════════════════════════════════
async function renderToCanvas(outWidth){
  await document.fonts.ready;
  const sw=stage.offsetWidth, sh=stage.offsetHeight;
  let W, H;
  if(outWidth==='native'){W=sw;H=sh;}
  else{W=parseInt(outWidth);H=Math.round(W*sh/sw);}
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=stage.style.background||'#ffffff';
  ctx.fillRect(0,0,W,H);
  const scale=W/sw;
  const items=Array.from(stage.querySelectorAll('.item'));
  items.sort((a,b)=>(parseInt(a.style.zIndex)||0)-(parseInt(b.style.zIndex)||0));
  for(const item of items) await renderItem(ctx,item,scale);
  return canvas;
}

async function renderItem(ctx, item, scale){
  const x=parseFloat(item.style.left);
  const y=parseFloat(item.style.top);
  const w=item.offsetWidth, h=item.offsetHeight;
  const cx=(x+w/2)*scale, cy=(y+h/2)*scale;
  const sw=w*scale, sh=h*scale;
  const rot=(parseFloat(item.dataset.rot)||0)*Math.PI/180;
  const fx=item.dataset.flipX==='1'?-1:1;
  const fy=item.dataset.flipY==='1'?-1:1;
  const opacity=parseFloat(item.style.opacity||'1');
  const hasShadow=item.classList.contains('shadowed');
  const type=item.dataset.type;

  ctx.save();
  ctx.globalAlpha=opacity;
  ctx.translate(cx,cy);
  ctx.rotate(rot);
  ctx.scale(fx,fy);
  if(hasShadow) ctx.filter='drop-shadow(3px 5px 8px rgba(0,0,0,0.55))';

  if(type==='image'){
    const img=item.querySelector('img');
    if(!img.complete||!img.naturalWidth){
      await new Promise(r=>{img.onload=r;img.onerror=r;});
    }
    ctx.imageSmoothingEnabled=item.classList.contains('smooth');
    ctx.drawImage(img,-sw/2,-sh/2,sw,sh);

  } else if(type==='text'){
    const tc=item.querySelector('.text-content');
    const fs=parseFloat(tc.style.fontSize)||40;
    const ff=tc.style.fontFamily||'sans-serif';
    const color=tc.style.color||'#000';
    const align=tc.style.textAlign||'left';
    const weight=tc.style.fontWeight||'normal';
    ctx.font=`${weight} ${fs*scale}px ${ff}`;
    ctx.fillStyle=color;
    ctx.textBaseline='top';
    ctx.textAlign=align==='center'?'center':align==='right'?'right':'left';
    const maxWidth=sw;

    function wrapLine(text){
      if(!text.trim()) return [text];
      const words=text.split(/\s+/);
      const out=[]; let line='';
      for(const word of words){
        const test=line?line+' '+word:word;
        if(ctx.measureText(test).width<=maxWidth||!line){line=test;}
        else{out.push(line);line=word;}
      }
      if(line) out.push(line);
      return out;
    }

    // ✅ FIX: use innerHTML-based parsing to preserve multi-line text
    const paragraphs=getTextLines(tc);
    const lines=[];
    for(const p of paragraphs){
      if(p.trim()==='') lines.push('');
      else lines.push(...wrapLine(p));
    }

    const lineHeight=fs*scale*1.2;
    const tx=align==='center'?0:align==='right'?sw/2:-sw/2;
    let ty=-sh/2;
    for(const line of lines){
      if(line!=='') ctx.fillText(line,tx,ty);
      ty+=lineHeight;
    }

  } else if(type==='rect'){
    const fill=item.dataset.fill||'#4f8eff';
    const stroke=item.dataset.stroke||'#000';
    const strokeW=(parseFloat(item.dataset.strokeW)||0)*scale;
    const radius=Math.min((parseFloat(item.dataset.radius)||0)*scale, sw/2, sh/2);
    ctx.fillStyle=fill;
    ctx.beginPath();
    if(radius>0&&ctx.roundRect){ctx.roundRect(-sw/2,-sh/2,sw,sh,radius);}
    else{ctx.rect(-sw/2,-sh/2,sw,sh);}
    ctx.fill();
    if(strokeW>0){ctx.strokeStyle=stroke;ctx.lineWidth=strokeW;ctx.stroke();}

  } else if(type==='circle'){
    const fill=item.dataset.fill||'#4f8eff';
    const stroke=item.dataset.stroke||'#000';
    const strokeW=(parseFloat(item.dataset.strokeW)||0)*scale;
    ctx.fillStyle=fill;
    ctx.beginPath();
    ctx.ellipse(0,0,sw/2,sh/2,0,0,Math.PI*2);
    ctx.fill();
    if(strokeW>0){ctx.strokeStyle=stroke;ctx.lineWidth=strokeW;ctx.stroke();}

  } else if(type==='triangle'){
    const fill=item.dataset.fill||'#4f8eff';
    const stroke=item.dataset.stroke||'#000';
    const strokeW=(parseFloat(item.dataset.strokeW)||0)*scale;
    const mx=p=>(p/100-0.5)*sw, my=p=>(p/100-0.5)*sh;
    ctx.fillStyle=fill;
    ctx.beginPath();
    ctx.moveTo(mx(50),my(5)); ctx.lineTo(mx(95),my(95)); ctx.lineTo(mx(5),my(95));
    ctx.closePath(); ctx.fill();
    if(strokeW>0){ctx.strokeStyle=stroke;ctx.lineWidth=strokeW;ctx.stroke();}

  } else if(type==='line'){
    ctx.fillStyle=item.dataset.fill||'#4f8eff';
    ctx.fillRect(-sw/2,-sh/2,sw,sh);

  } else if(PATH_SHAPES.includes(type)){
    // ✅ FIX: render all SVG path shapes (star, heart, arrow, bubble, pentagon, hexagon)
    const fill=item.dataset.fill||'#4f8eff';
    const stroke=item.dataset.stroke||'#000';
    const strokeW=parseFloat(item.dataset.strokeW)||0;
    const pathStr=SVG_PATHS[type]();
    ctx.save();
    // Move to item top-left, scale 0-100 → actual pixels
    ctx.translate(-sw/2,-sh/2);
    ctx.scale(sw/100,sh/100);
    const p2d=new Path2D(pathStr);
    ctx.fillStyle=fill;
    ctx.fill(p2d);
    if(strokeW>0){
      ctx.strokeStyle=stroke;
      // Normalize stroke: un-scale back to screen pixels
      const avgScale=(sw+sh)/200;
      ctx.lineWidth=strokeW/avgScale*scale;
      ctx.stroke(p2d);
    }
    ctx.restore();
  }

  ctx.restore();
}

document.getElementById('btn-export').onclick=async()=>{
  const prev=selected;
  select(null);
  await new Promise(r=>requestAnimationFrame(r));
  try{
    const size=document.getElementById('export-size').value;
    const canvas=await renderToCanvas(size);
    const link=document.createElement('a');
    link.download='export_'+Date.now()+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    toast('✓ Gespeichert · '+canvas.width+'×'+canvas.height);
  }catch(err){
    console.error(err);
    alert('Export Fehler: '+err.message);
  }
  if(prev&&prev.isConnected) select(prev);
};

// ═══════════════════════════════════════════════════════════
// PAINT TOOLS (Pinsel, Radiergummi, Pipette)
// ═══════════════════════════════════════════════════════════
let paintMode=null;
let paintCanvas=null, paintCtx=null;
let isPainting=false;

function getPaintCanvas(){
  if(!paintCanvas){
    paintCanvas=document.createElement('canvas');
    paintCanvas.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:500;';
    paintCanvas.width=stage.offsetWidth; paintCanvas.height=stage.offsetHeight;
    stage.appendChild(paintCanvas);
    paintCtx=paintCanvas.getContext('2d');
  }
  return paintCanvas;
}

document.getElementById('tool-paint').onclick=()=>{
  paintMode=paintMode==='paint'?null:'paint';
  stage.classList.toggle('paint-mode',paintMode==='paint');
  stage.classList.remove('erase-mode');
  if(paintMode==='paint'){
    document.getElementById('paint-bar').classList.add('open');
    document.getElementById('tool-paint').classList.add('active');
    document.getElementById('tool-erase').classList.remove('active');
    getPaintCanvas();
  } else {
    document.getElementById('paint-bar').classList.remove('open');
    document.getElementById('tool-paint').classList.remove('active');
  }
};

document.getElementById('tool-erase').onclick=()=>{
  paintMode=paintMode==='erase'?null:'erase';
  stage.classList.toggle('erase-mode',paintMode==='erase');
  stage.classList.remove('paint-mode');
  if(paintMode==='erase'){
    document.getElementById('paint-bar').classList.add('open');
    document.getElementById('tool-erase').classList.add('active');
    document.getElementById('tool-paint').classList.remove('active');
    getPaintCanvas();
  } else {
    document.getElementById('paint-bar').classList.remove('open');
    document.getElementById('tool-erase').classList.remove('active');
  }
};

document.getElementById('paint-size').addEventListener('input',e=>{
  document.getElementById('paint-size-num').textContent=e.target.value+'px';
});

document.getElementById('paint-clear-layer').onclick=()=>{
  if(paintCtx) paintCtx.clearRect(0,0,paintCanvas.width,paintCanvas.height);
};

document.getElementById('paint-exit').onclick=()=>{
  paintMode=null;
  stage.classList.remove('paint-mode','erase-mode');
  document.getElementById('paint-bar').classList.remove('open');
  document.getElementById('tool-paint').classList.remove('active');
  document.getElementById('tool-erase').classList.remove('active');
};

stage.addEventListener('pointerdown',e=>{
  if(!paintMode||!paintCanvas) return;
  if(e.target===stage||e.target===paintCanvas){
    isPainting=true;
    const r=stage.getBoundingClientRect();
    const sc=stage.offsetWidth/r.width;
    const px=(e.clientX-r.left)*sc, py=(e.clientY-r.top)*sc;
    paintCtx.beginPath(); paintCtx.moveTo(px,py);
    e.preventDefault();
  }
});

stage.addEventListener('pointermove',e=>{
  if(!isPainting||!paintCanvas) return;
  const r=stage.getBoundingClientRect();
  const sc=stage.offsetWidth/r.width;
  const px=(e.clientX-r.left)*sc, py=(e.clientY-r.top)*sc;
  const size=parseFloat(document.getElementById('paint-size').value);
  const color=document.getElementById('paint-color').value;
  if(paintMode==='erase'){
    paintCtx.globalCompositeOperation='destination-out';
    paintCtx.lineWidth=size*2;
  } else {
    paintCtx.globalCompositeOperation='source-over';
    paintCtx.strokeStyle=color; paintCtx.lineWidth=size;
  }
  paintCtx.lineCap='round'; paintCtx.lineJoin='round';
  paintCtx.lineTo(px,py); paintCtx.stroke();
  paintCtx.beginPath(); paintCtx.moveTo(px,py);
});

stage.addEventListener('pointerup',()=>{isPainting=false;if(paintCtx){paintCtx.globalCompositeOperation='source-over';}});

// Eyedropper
document.getElementById('tool-eyedropper').onclick=()=>{
  if(!window.EyeDropper){toast('Nicht unterstützt');return;}
  const e=new EyeDropper();
  e.open().then(r=>{
    document.getElementById('paint-color').value=r.sRGBHex;
    toast('Farbe: '+r.sRGBHex);
  }).catch(()=>{});
};
