name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate image manifest
        run: |
          mkdir -p images
          cd images
          python3 -c "
          import os, json
          exts = {'.png','.jpg','.jpeg','.gif','.webp','.svg','.bmp'}
          files = sorted([f for f in os.listdir('.') if os.path.splitext(f)[1].lower() in exts and f != 'manifest.json'])
          with open('manifest.json','w') as m:
              json.dump(files, m, indent=2)
          print(f'Manifest: {len(files)} image(s)')
          "
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
